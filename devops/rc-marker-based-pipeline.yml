# RC (Release Candidate) Marker-Based Test Execution Pipeline
#
# This pipeline executes marker-based tests for RC builds with aggregated TestRail integration.
# Tests are routed to compatible agents based on @pytest.mark.platform() and 
# @pytest.mark.connected_device() decorators. Results are aggregated across all platforms
# and uploaded as consolidated results to TestRail under monthly RC milestones (e.g., "HP APP 2025.01 RC").
# Each test case gets ONE result showing all platform combinations (passed/failed/skipped).
#
# Prerequisites:
# 1. Tests must have @pytest.mark.platform() and/or @pytest.mark.connected_device() markers
# 2. Tests should have @pytest.mark.testrail("S<suite_id>:C<case_id>") for TestRail upload
# 3. Variable group 'secrets' must contain:
#    - AzureDevOpsPAT (Agent Pools Read permission)
#    - TESTRAIL_API_KEY
#    - TESTRAIL_USER_NAME
# 4. Variable group 'HP App Build Pipeline Variables' must contain:
#    - Project ID
#    - TESTRAIL_PROJECT_ID
#    - TESTRAIL_SUITE_ID
# 5. Agents in ASQE-QAMA-General pool must have Platform and device capabilities configured

trigger: none  # Manual execution only for RC testing
pr: none

parameters:
- name: buildVersion
  displayName: 'Build Version (e.g., 53.42601.121.0)'
  type: string
- name: testrailRunId
  displayName: 'TestRail Run ID'
  type: string

variables:
- group: secrets  # Contains AzureDevOpsPAT, TESTRAIL_API_KEY, TESTRAIL_USER_NAME
- group: HP App Build Pipeline Variables  # Contains Project ID, TESTRAIL_PROJECT_ID, TESTRAIL_SUITE_ID, Stage
- name: testSuiteBasePath
  value: 'tests/hp_app'
- name: pipelineIdStaging
  value: $[variables['Stage']]

stages:
# Stage 0: Preparation - Categorize TestRail tests by suite
- stage: PrepareTestRun
  displayName: 'Prepare Test Run'
  dependsOn: []
  
  jobs:
  - job: CategorizeTests
    displayName: 'Categorize TestRail Tests by Suite'
    pool:
      name: ASQE-QAMA-VM
    
    steps:
    # Checkout is needed - script scans test files for TestRail markers
    - checkout: self
    
    - ${{ if ne(parameters.testrailRunId, '') }}:
      - task: PythonScript@0
        name: CategorizeTestRailTests
        displayName: 'Categorize TestRail Tests by Suite'
        env:
          TESTRAIL_URL: $(TESTRAIL_URL)
          TESTRAIL_USER_NAME: $(TESTRAIL_USER_NAME)
          TESTRAIL_API_KEY: $(TESTRAIL_API_KEY)
        inputs:
          scriptSource: 'filePath'
          scriptPath: '$(Build.Repository.LocalPath)/devops/utils/test-execution/categorize-testrail-tests.py'
          arguments: '--run-id "${{ parameters.testrailRunId }}" --base-path "$(Build.Repository.LocalPath)/$(testSuiteBasePath)" --output "$(Build.ArtifactStagingDirectory)/testrail-suite-categorization.json"'
          workingDirectory: '$(Build.Repository.LocalPath)'
          failOnStderr: false
    
    - ${{ if eq(parameters.testrailRunId, '') }}:
      - task: PowerShell@2
        name: CategorizeTestRailTests
        displayName: 'Set All Suites to Run (No TestRail Filter)'
        inputs:
          targetType: 'inline'
          script: |
            # When no TestRail run ID provided, all suites should run
            Write-Host "##[section]No TestRail run ID provided - all suites will execute"
            Write-Host "##vso[task.setvariable variable=pen_controlTestCount;isOutput=true]999"
            Write-Host "##vso[task.setvariable variable=audioTestCount;isOutput=true]999"
            Write-Host "##vso[task.setvariable variable=smart_displaysTestCount;isOutput=true]999"
    
    # Publish TestRail categorization as artifact for downstream stages to use
    - ${{ if ne(parameters.testrailRunId, '') }}:
      - task: PublishPipelineArtifact@1
        displayName: 'Publish TestRail Categorization'
        inputs:
          targetPath: '$(Build.ArtifactStagingDirectory)/testrail-suite-categorization.json'
          artifact: 'TestRail Categorization'
          publishLocation: 'pipeline'

# Run all pen control tests (excluding robotics)
- stage: RC_PenControl
  displayName: 'RC: Pen Control Tests'
  dependsOn: PrepareTestRun
  condition: gt(dependencies.PrepareTestRun.outputs['CategorizeTests.CategorizeTestRailTests.pen_controlTestCount'], 0)
  
  jobs:
  - template: templates/job templates/marker-based-test-execution-job.yml
    parameters:
      suitePath: '$(testSuiteBasePath)/pen_control'
      pipelineId: $(pipelineIdStaging)
      buildVersion: '${{ parameters.buildVersion }}'
      testrailRunId: '${{ parameters.testrailRunId }}'
      pytestArgs: '-v --tb=short'
      additionalMarkerFilter: 'not robotics'
      workingDirectory: '$(Build.SourcesDirectory)'
      # Note: No TestRail upload here - handled by aggregation stage

# Run all audio tests (excluding robotics)
- stage: RC_Audio
  displayName: 'RC: Audio Tests'
  dependsOn: PrepareTestRun
  condition: gt(dependencies.PrepareTestRun.outputs['CategorizeTests.CategorizeTestRailTests.audioTestCount'], 0)
  
  jobs:
  - template: templates/job templates/marker-based-test-execution-job.yml
    parameters:
      suitePath: '$(testSuiteBasePath)/audio'
      pipelineId: $(pipelineIdStaging)
      buildVersion: '${{ parameters.buildVersion }}'
      testrailRunId: '${{ parameters.testrailRunId }}'
      pytestArgs: '-v --tb=short'
      additionalMarkerFilter: 'not robotics'
      workingDirectory: '$(Build.SourcesDirectory)'
      # Note: No TestRail upload here - handled by aggregation stage

# Run smart displays tests
- stage: RC_SmartDisplays
  displayName: 'RC: Smart Displays Tests'
  dependsOn: PrepareTestRun
  condition: gt(dependencies.PrepareTestRun.outputs['CategorizeTests.CategorizeTestRailTests.smart_displaysTestCount'], 0)
  
  jobs:
  - template: templates/job templates/marker-based-test-execution-job.yml
    parameters:
      suitePath: '$(testSuiteBasePath)/smart_displays'
      pipelineId: $(pipelineIdStaging)
      buildVersion: '${{ parameters.buildVersion }}'
      testrailRunId: '${{ parameters.testrailRunId }}'
      pytestArgs: '-v --tb=short'
      additionalMarkerFilter: 'not robotics'
      workingDirectory: '$(Build.SourcesDirectory)'
      # Note: No TestRail upload here - handled by aggregation stage

# Aggregate results and upload to TestRail
- stage: AggregateResults
  displayName: 'Aggregate and Upload Results'
  dependsOn:
  - RC_PenControl
  - RC_Audio
  - RC_SmartDisplays
  condition: always()  # Run even if some tests failed
  
  jobs:
  - job: AggregateAndUpload
    displayName: 'Aggregate Results and Upload to TestRail'
    pool:
      name: ASQE-QAMA-VM
    
    steps:
    # Step 1: Clean test results directory before downloading artifacts
    - task: PowerShell@2
      displayName: 'Clean Test Results Directory'
      condition: always()
      inputs:
        targetType: 'inline'
        script: |
          $resultsPath = "$(Pipeline.Workspace)/test-results"
          if (Test-Path $resultsPath) {
            Remove-Item -Recurse -Force "$resultsPath/*"
          }

    # Step 2: Download all test result artifacts
    - task: DownloadPipelineArtifact@2
      displayName: 'Download All Test Results'
      inputs:
        source: 'current'
        patterns: '**/test-results-*.xml'
        path: '$(Pipeline.Workspace)/test-results'
    
    # Step 3: Aggregate and upload to TestRail
    - task: PowerShell@2
      displayName: 'Aggregate Results and Upload to TestRail'
      env:
        TESTRAIL_API_KEY: $(TESTRAIL_API_KEY)
        TESTRAIL_USER_NAME: $(TESTRAIL_USER_NAME)
        TESTRAIL_URL: $(TESTRAIL_URL)
        TESTRAIL_PROJECT_ID: $(TESTRAIL_PROJECT_ID)
        TESTRAIL_SUITE_ID: $(TESTRAIL_SUITE_ID)
        SYSTEM_TEAMFOUNDATIONCOLLECTIONURI: $(System.TeamFoundationCollectionUri)
        SYSTEM_TEAMPROJECT: $(System.TeamProject)
        BUILD_BUILDID: $(Build.BuildId)
        PYTHONPATH: $(System.DefaultWorkingDirectory)
        TESTRAIL_RUN_ID: ${{ parameters.testrailRunId }}
      inputs:
        targetType: 'inline'
        script: |
          $scriptPath = "$(Build.Repository.LocalPath)/devops/utils/test-execution/aggregate-test-results.py"
          $artifactDir = "$(Pipeline.Workspace)/test-results"
          
          $args = @(
            "--artifact-dir", "`"$artifactDir`""
          )
          
          $testrailRunId = $env:TESTRAIL_RUN_ID
          if ($testrailRunId -ne "") {
            $args += "--testrail-run-id", "`"$testrailRunId`""
          } else {
            $args += "--run-name", "`"[Automation][PSCORE][HPX Rebrand][RC][$(Build.BuildNumber)]`""
          }

          if ("${{ parameters.buildVersion }}" -ne "") {
            $args += "--version", "`"${{ parameters.buildVersion }}`""
          }
          
          Write-Host "Running: python $scriptPath $($args -join ' ')"
          python $scriptPath @args
        workingDirectory: '$(Build.Repository.LocalPath)'

# Expected Behavior:
# 1. User triggers pipeline manually with required buildVersion parameter
# 2. Test Execution Stages (RC_PenControl, RC_Audio, RC_SmartDisplays):
#    - Discovery job parses markers and generates agent matrix
#    - Execution jobs run in parallel on ASQE-QAMA-General
#    - Install specified myHP build version
#    - Execute tests on platform×device combinations
#    - Publish XML results as pipeline artifacts (NO TestRail upload yet)
# 3. Aggregation Stage (runs after all test stages complete):
#    - Downloads all test result XML files from artifacts
#    - Aggregates results by test case across all platforms
#    - Builds consolidated comments showing platform×device combinations
#    - Uploads ONE result per test case to TestRail with:
#      * Overall status (failed if any platform failed, else passed)
#      * Execution summary listing all platforms and their outcomes
#      * Failure details for each failed platform
#    - Run name format: [Automation][PSCORE][HPX Rebrand][RC][Build Number]
# 
# Result Format in TestRail:
# ✓ PASSED (2):
#   • cashmerexi × roo (45.2s)
#   • machu13x × none (38.7s)
# ✗ FAILED (1):
#   • ventura × roo (12.3s)
# === Failure Details ===
# [ventura × roo]
# AssertionError: ...
