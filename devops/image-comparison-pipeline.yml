# Image Comparison Test Execution Pipeline
# 
# Purpose: Executes image comparison tests across all modules using marker-based agent routing
# 
# This pipeline provides comprehensive image comparison testing across all HP App modules:
# - Module Coverage: All 21 modules under tests/hp_app/
# - Test Filter: Only executes tests marked with @pytest.mark.image_comparison
# - Pytest Markers: Routes tests to compatible agents using @pytest.mark.platform and @pytest.mark.connected_device
# - Parallel Execution: Runs all modules in parallel across platform×device matrices
# - Image Bank: Checks out asqe-hp-app-imagebank repository for baseline image references
#
# Pipeline Behavior:
# 1. Checks out asqe-hp-app-imagebank repository for baseline image assets
# 2. Each module runs as an independent stage with marker-based agent routing
# 3. Discovery phase parses pytest markers and queries Azure DevOps for agent capabilities
# 4. Execution phase runs only image_comparison tests in parallel across platform×device combinations
# 5. Results are aggregated in a summary stage showing pass/fail status for all modules
#
# Pytest Marker Requirements:
# - All test classes/functions must have @pytest.mark.platform("platform_name") decorator
# - All tests must have @pytest.mark.image_comparison decorator
# - Device markers are optional: @pytest.mark.connected_device("device_name")
# - Tests without platform markers will fail during discovery phase
#
# Agent Requirements:
# - Discovery: ASQE-QAMA-VM pool (lightweight, for parsing and API queries)
# - Execution: ASQE-QAMA-General pool (test agents with Platform and device capabilities)
#
# Template Integration:
# - Uses templates/job templates/marker-based-test-execution-job.yml for all modules
# - Filters to only image_comparison tests (excluding analytics) using additionalMarkerFilter parameter

# Disable PR and manual triggers - scheduled only
trigger: none
pr: none

# Schedule: Daily at 3:00 AM MT (10:00 AM UTC), Monday-Friday and Sunday (excludes Saturday)
schedules:
- cron: "0 10 * * 0-5"  # Minute Hour DayOfMonth Month DayOfWeek (0=Sunday, 6=Saturday)
  displayName: 'Image Comparison Tests (3 AM MT, except Saturday)'
  branches:
    include:
    - master
  always: true  # Run even if no code changes

# Repository resources - checkout image bank for baseline images
resources:
  repositories:
  - repository: imagebank
    type: github
    endpoint: hpi-sandbox
    name: hpi-sandbox/asqe-titan-imagebank
    ref: master

# Include variable groups for pipeline configuration
variables:
- group: HP App Build Pipeline Variables  # Contains Project ID, build pipeline references, pool names, and script paths
- group: secrets  # Contains AzureDevOpsPAT for Azure DevOps API agent discovery
- name: testSuiteBasePath
  value: 'tests/hp_app'
- name: pipelineId
  value: '$(Production)'

parameters:
- name: modules
  type: object
  default:
    - name: Audio
      suitePath: audio
    - name: Battery
      suitePath: battery
    - name: Context Aware
      suitePath: context_aware
    - name: Display Control
      suitePath: display_control
    - name: Dock Station
      suitePath: dock_station
    - name: Energy Consumption
      suitePath: energy_consumption
    - name: Gesture
      suitePath: gesture
    - name: HPPK
      suitePath: hppk
    - name: HP Go
      suitePath: hp_go
    - name: PC Device
      suitePath: pc_device
    - name: Pen Control
      suitePath: pen_control
    - name: Perform AIC
      suitePath: perform_aic
    - name: Presence Sensing
      suitePath: presence_sensing
    - name: Smart Displays
      suitePath: smart_displays
    - name: Smart Experience
      suitePath: smart_experience
    - name: System Control
      suitePath: system_control
    - name: Task Group
      suitePath: task_group
    - name: Touchpad
      suitePath: touchpad
    - name: Video Control
      suitePath: video_control
    - name: Wellbeing
      suitePath: wellbeing

stages:
- ${{ each module in parameters.modules }}:
  - stage: ${{ replace(module.name, ' ', '') }}
    displayName: '${{ module.name }} Image Comparison Tests'
    dependsOn: []

    jobs:
    - template: templates/job templates/marker-based-test-execution-job.yml
      parameters:
        suitePath: '$(testSuiteBasePath)/${{ module.suitePath }}'
        pipelineId: '$(pipelineId)'
        pytestArgs: '-v --tb=short --context-manager verify'
        additionalMarkerFilter: 'image_comparison'
        checkoutImageBank: true

# Stage 22: Aggregate Results from All Test Executions
- stage: SummaryResults
  displayName: 'Image Comparison Test Summary'
  dependsOn:
  - ${{ each module in parameters.modules }}:
    - ${{ replace(module.name, ' ', '') }}
  condition: always()
  
  jobs:
  - job: AggregateResults
    displayName: 'Aggregate Image Comparison Test Results'
    pool:
      name: $(discoveryAgentPool)
    steps:
    
    - checkout: self
    
    # Download test results from all execution jobs
    - task: DownloadPipelineArtifact@2
      displayName: 'Download Test Results'
      continueOnError: true
      inputs:
        buildType: 'current'
        targetPath: '$(Pipeline.Workspace)/TestResults'
    
    - task: PowerShell@2
      displayName: 'Aggregate Image Comparison Test Results'
      inputs:
        targetType: 'filePath'
        filePath: '$(Build.SourcesDirectory)/scripts/Aggregate-TestResults.ps1'
        arguments: '-TestResultsPath "$(Pipeline.Workspace)/TestResults"'
      continueOnError: true

    - task: PowerShell@2
      displayName: 'Send Test Report Email'
      inputs:
        targetType: 'inline'
        script: |
          Write-Host "Sending PR test report email"
          python "$(Build.SourcesDirectory)/scripts/send_test_report.py" `
            --test-results-path "$(Pipeline.Workspace)/TestResults" `
            --pipeline-name "$(Build.DefinitionName)" `
            --build-url "$(System.TeamFoundationCollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)"
