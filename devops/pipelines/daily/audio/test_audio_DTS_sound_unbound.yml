# Audio Test POC Pipeline
# Tests audio functionality on remove-ssh branch (SAF dependency removal)

trigger: none

pr: none

variables:
- group: HP App Build Pipeline Variables


pool:
  name: ASQE-QAMA-General

jobs:
# Use complete test execution template - handles both app install and test execution
- template: templates/job templates/complete-test-execution-job.yml
  parameters:
    suitePath: 'audio'
    pipelineId: '$(Stage)'
    testFiles: ['test_audio_DTS_sound_unbound.py']
    pytestArgs: ''
    workingDirectory: '$(Build.Repository.LocalPath)/tests/hp_app'
