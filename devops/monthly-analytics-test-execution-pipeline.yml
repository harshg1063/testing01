# Monthly Analytics Test Execution Pipeline
# 
# Purpose: Executes analytics-specific test modules monthly using marker-based agent routing
# 
# This pipeline provides comprehensive monthly analytics test execution across all HP App modules:
# - Module Coverage: All modules under tests/hp_app/ that have analytics tests
# - Pytest Markers: Routes tests to compatible agents using @pytest.mark.platform, @pytest.mark.connected_device, and @pytest.mark.analytics
# - Parallel Execution: Runs all modules in parallel across platform×device matrices
# - Scheduled Execution: Runs monthly on the 1st day at 11:00 PM UTC
#
# Pipeline Behavior:
# 1. Each module runs as an independent stage with marker-based agent routing
# 2. Discovery phase parses pytest markers and queries Azure DevOps for agent capabilities
# 3. Execution phase runs tests in parallel across all platform×device combinations
# 4. Results are aggregated in a summary stage showing pass/fail status for all modules
#
# Pytest Marker Requirements:
# - All test classes/functions must have @pytest.mark.platform("platform_name") decorator
# - All analytics tests must have @pytest.mark.analytics decorator
# - Device markers are optional: @pytest.mark.connected_device("device_name")
# - Tests without platform markers will fail during discovery phase
#
# Agent Requirements:
# - Discovery: ASQE-QAMA-VM pool (lightweight, for parsing and API queries)
# - Execution: ASQE-QAMA-General pool (test agents with Platform and device capabilities)
#
# Template Integration:
# - Uses templates/job templates/marker-based-test-execution-job.yml for all modules
# - Filters for analytics tests only using additionalMarkerFilter parameter

# Disable PR and manual triggers - scheduled only
trigger: none
pr: none

# Schedule: Monthly on the 1st day at 11:00 PM UTC
schedules:
- cron: "0 23 1 * *"  # Minute Hour DayOfMonth Month DayOfWeek
  displayName: 'Monthly Analytics Test Execution (1st of month at 11 PM UTC)'
  branches:
    include:
    - master
  always: true  # Run even if no code changes

# Include variable groups for pipeline configuration
variables:
- group: HP App Build Pipeline Variables  # Contains Project ID, build pipeline references, pool names, and script paths
- group: secrets  # Contains AzureDevOpsPAT for Azure DevOps API agent discovery
- name: buildPipelineId
  value: '$(Production)'
- name: testSuiteBasePath
  value: 'tests/hp_app/analytics'

parameters:
- name: modules
  type: object
  default:
    - name: AIC Analytics
      suitePath: aic_analytics
    - name: Audio Analytics
      suitePath: audio_analytics
    - name: Battery Manager Analytics
      suitePath: battery_manager_analytics
    - name: Context Aware Analytics
      suitePath: context_aware_analytics
    - name: Display Analytics
      suitePath: display_analytics
    - name: Dock Analytics
      suitePath: dock_analytics
    - name: Energy Consumption Analytics
      suitePath: energy_consumption_analytics
    - name: Gesture Analytics
      suitePath: gestures_analytics
    - name: HPPK Analytics
      suitePath: hppk_analytics
    - name: PC Device Analytics
      suitePath: pcdevice_analytics
    - name: Pen Control Analytics
      suitePath: pen_control_analytics
    - name: Smart Experience Analytics
      suitePath: smart_experience_analytics
    - name: System Control Analytics
      suitePath: system_control_analytics
    - name: Touchpad Analytics
      suitePath: touchpad_analytcis
    - name: Video Analytics
      suitePath: video_analytics
    - name: Wellbeing Analytics
      suitePath: wellbeing_analytics

stages:
- ${{ each module in parameters.modules }}:
  - stage: ${{ replace(module.name, ' ', '') }}
    displayName: '${{ module.name }} Tests'
    dependsOn: []

    jobs:
    - template: templates/job templates/marker-based-test-execution-job.yml
      parameters:
        suitePath: '$(testSuiteBasePath)/${{ module.suitePath }}'
        pipelineId: '$(buildPipelineId)'
        pytestArgs: '-v --tb=short'
        additionalMarkerFilter: 'analytics'
        workingDirectory: '$(Build.SourcesDirectory)'

# Stage 17: Aggregate Results from All Test Executions
- stage: SummaryResults
  displayName: 'Monthly Analytics Test Summary'
  dependsOn:
  - ${{ each module in parameters.modules }}:
    - ${{ replace(module.name, ' ', '') }}
  condition: always()
  
  jobs:
  - job: AggregateResults
    displayName: 'Aggregate Analytics Test Results'
    pool:
      name: $(discoveryAgentPool)
    steps:
    
    - checkout: self
    
    # Download test results from all execution jobs
    - task: DownloadPipelineArtifact@2
      displayName: 'Download Test Results'
      continueOnError: true
      inputs:
        buildType: 'current'
        targetPath: '$(Pipeline.Workspace)/TestResults'
    
    - task: PowerShell@2
      displayName: 'Aggregate Analytics Test Results'
      inputs:
        targetType: 'filePath'
        filePath: '$(Build.SourcesDirectory)/scripts/Aggregate-TestResults.ps1'
        arguments: '-TestResultsPath "$(Pipeline.Workspace)/TestResults"'
      continueOnError: true

    - task: PowerShell@2
      displayName: 'Send Test Report Email'
      inputs:
        targetType: 'inline'
        script: |
          Write-Host "Sending PR test report email"
          python "$(Build.SourcesDirectory)/scripts/send_test_report.py" `
            --test-results-path "$(Pipeline.Workspace)/TestResults" `
            --pipeline-name "$(Build.DefinitionName)" `
            --build-url "$(System.TeamFoundationCollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)"