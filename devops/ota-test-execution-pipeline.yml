# OTA Test Execution Pipeline (Saturday Regression Testing)
# 
# Purpose: Executes all test modules weekly on Saturdays using OTA (Over-The-Air) installation
# 
# This pipeline provides comprehensive weekly regression testing across all HP App modules:
# - Module Coverage: All 21 modules under tests/hp_app/
# - Installation Method: OTA upgrade path (baseline version → new version)
# - Pytest Markers: Routes tests to compatible agents using @pytest.mark.platform and @pytest.mark.connected_device
# - Parallel Execution: Runs all modules in parallel across platform×device matrices
# - Scheduled Execution: Runs weekly on Saturdays at 3:00 AM MT (10:00 AM UTC)
#
# OTA Testing Strategy:
# - Simulates real-world upgrade scenarios where users update from previous versions
# - Tests upgrade path integrity, data persistence, and compatibility
# - Complements daily pipeline's clean installation testing
# - Validates that upgrades don't break existing functionality
#
# Pipeline Behavior:
# 1. Each module runs as an independent stage with marker-based agent routing
# 2. Discovery phase parses pytest markers and queries Azure DevOps for agent capabilities
# 3. Installation uses OTA template: installs the configured baseline version, then upgrades to the new version
# 4. Execution phase runs tests in parallel across all platform×device combinations
# 5. Results are aggregated in a summary stage showing pass/fail status for all modules
#
# Pytest Marker Requirements:
# - All test classes/functions must have @pytest.mark.platform("platform_name") decorator
# - Device markers are optional: @pytest.mark.connected_device("device_name")
# - Tests without platform markers will fail during discovery phase
#
# Agent Requirements:
# - Discovery: ASQE-QAMA-VM pool (lightweight, for parsing and API queries)
# - Execution: ASQE-QAMA-General pool (test agents with Platform and device capabilities)
#
# Template Integration:
# - Uses templates/job templates/marker-based-test-execution-job.yml for all modules
# - Sets useOtaInstall: true to enable OTA installation template
# - Filters out robotics, analytics, and image_comparison tests using additionalMarkerFilter parameter
#
# Note: OTA installation takes longer than clean install due to two-phase process
# (baseline install + upgrade). Expected runtime may be longer than daily pipeline.

# Disable PR and manual triggers - scheduled only
trigger: none
pr: none

# Schedule: Weekly on Saturdays at 3:00 AM MT (10:00 AM UTC)
schedules:
- cron: "0 10 * * 6"  # Minute Hour DayOfMonth Month DayOfWeek (6=Saturday)
  displayName: 'OTA Test Execution (3 AM MT, Saturday Only)'
  branches:
    include:
    - master
  always: true  # Run even if no code changes

# Include variable groups for pipeline configuration
variables:
- group: HP App Build Pipeline Variables  # Contains Project ID, build pipeline references, pool names
- group: secrets  # Contains AzureDevOpsPAT for Azure DevOps API agent discovery
- name: testSuiteBasePath
  value: 'tests/hp_app'
- name: pipelineId
  value: '$(Production)'
- name: commonMarkerExclusionFilter
  value: 'not robotics and not analytics and not image_comparison and not localization'

parameters:
- name: modules
  type: object
  default:
    - name: Audio
      suitePath: audio
    - name: Battery
      suitePath: battery
    - name: Context Aware
      suitePath: context_aware
    - name: Display Control
      suitePath: display_control
    - name: Dock Station
      suitePath: dock_station
    - name: Energy Consumption
      suitePath: energy_consumption
    - name: Gesture
      suitePath: gesture
    - name: HPPK
      suitePath: hppk
    - name: HP Go
      suitePath: hp_go
    - name: PC Device
      suitePath: pc_device
    - name: Pen Control
      suitePath: pen_control
    - name: Perform AIC
      suitePath: perform_aic
    - name: Presence Sensing
      suitePath: presence_sensing
    - name: Smart Displays
      suitePath: smart_displays
    - name: Smart Experience
      suitePath: smart_experience
    - name: System Control
      suitePath: system_control
    - name: Task Group
      suitePath: task_group
    - name: Touchpad
      suitePath: touchpad
    - name: Video Control
      suitePath: video_control
    - name: Wellbeing
      suitePath: wellbeing

stages:
- ${{ each module in parameters.modules }}:
  - stage: ${{ replace(module.name, ' ', '') }}
    displayName: '${{ module.name }} Tests (OTA)'
    dependsOn: []

    jobs:
    - template: templates/job templates/marker-based-test-execution-job.yml
      parameters:
        suitePath: '$(testSuiteBasePath)/${{ module.suitePath }}'
        pipelineId: '$(pipelineId)'
        pytestArgs: '-v --tb=short'
        additionalMarkerFilter: '$(commonMarkerExclusionFilter)'
        useOtaInstall: true

# Stage 21: Aggregate Results from All Test Executions
- stage: SummaryResults
  displayName: 'OTA Test Summary'
  dependsOn:
  - ${{ each module in parameters.modules }}:
    - ${{ replace(module.name, ' ', '') }}
  condition: always()
  
  jobs:
  - job: AggregateResults
    displayName: 'Aggregate OTA Test Results'
    pool:
      name: $(discoveryAgentPool)
    steps:
    
    - checkout: self
    
    # Download test results from all execution jobs
    - task: DownloadPipelineArtifact@2
      displayName: 'Download Test Results'
      continueOnError: true
      inputs:
        buildType: 'current'
        targetPath: '$(Pipeline.Workspace)/TestResults'
    
    - task: PowerShell@2
      displayName: 'Aggregate OTA Test Results'
      inputs:
        targetType: 'filePath'
        filePath: '$(Build.SourcesDirectory)/scripts/Aggregate-TestResults.ps1'
        arguments: '-TestResultsPath "$(Pipeline.Workspace)/TestResults"'
      continueOnError: true

    - task: PowerShell@2
      displayName: 'Send Test Report Email'
      inputs:
        targetType: 'inline'
        script: |
          Write-Host "Sending PR test report email"
          python "$(Build.SourcesDirectory)/scripts/send_test_report.py" `
            --test-results-path "$(Pipeline.Workspace)/TestResults" `
            --pipeline-name "$(Build.DefinitionName)" `
            --build-url "$(System.TeamFoundationCollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)"