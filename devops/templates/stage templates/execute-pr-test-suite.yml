# Execute PR Test Suite Stage Template
#
# Purpose: Conditionally executes marker-based tests for specific modified test files in a module
#
# This template:
# - Creates a stage for executing tests in a specific module directory
# - Conditionally runs only when the module was detected as modified by AnalyzePR stage
# - Retrieves the list of modified test files for the module from AnalyzePR outputs
# - Calls marker-based-test-execution-job.yml with specific test files
# - Filters out robotics tests using additionalMarkerFilter
#
# Parameters:
# - moduleName: Name of the module directory under tests/hp_app/ (e.g., 'pen_control', 'audio')
#
# Condition:
# - Runs only if dependencies.AnalyzePR.outputs['ProcessPR.AnalyzeFiles.has_<moduleName>'] == 'true'
#
# Usage Example:
#   - template: templates/stage templates/execute-pr-test-suite.yml
#     parameters:
#       moduleName: pen_control

parameters:
- name: moduleName
  type: string
  displayName: 'Module Name'

stages:
- stage: ExecuteTests_${{ parameters.moduleName }}
  displayName: 'Execute ${{ parameters.moduleName }} Tests'
  dependsOn: AnalyzePR
  condition: and(succeeded('AnalyzePR'), eq(dependencies.AnalyzePR.outputs['ProcessPR.AnalyzeFiles.has_${{ parameters.moduleName }}'], 'true'))
  
  jobs:
  - template: ../job templates/marker-based-test-execution-job.yml
    parameters:
      suitePath: 'tests/hp_app/${{ parameters.moduleName }}'
      pipelineId: '$(Production)'
      pytestArgs: '-v'
      additionalMarkerFilter: ''
      # Pass module name so job can construct the variable reference
      moduleName: '${{ parameters.moduleName }}'
      workingDirectory: '$(Build.SourcesDirectory)'
