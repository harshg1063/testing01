# Publish Test Results Step Template
# Publishes test results to Azure DevOps with configurable options
# Parameters:
#   testRunTitle: Title for the test run (required)
#   artifactName: Name for the test results artifact (required)
#   testResultsPath: Path pattern to test result files (required)
#   testResultsFormat: Format of test results (default: 'JUnit')
#   mergeTestResults: Whether to merge test results (default: true)
#   publishRunAttachments: Whether to publish run attachments (default: true)

parameters:
- name: testRunTitle
  type: string
- name: artifactName
  type: string
- name: testResultsPath
  type: string
- name: testResultsFormat
  type: string
  default: 'JUnit'
- name: mergeTestResults
  type: boolean
  default: true
- name: publishRunAttachments
  type: boolean
  default: true

steps:
- task: PowerShell@2
  displayName: 'Verify Test Results Exist'
  inputs:
    targetType: 'inline'
    script: |
      $testResultsPath = "${{ parameters.testResultsPath }}"
      Write-Host "Looking for test results: $testResultsPath"
      
      $foundFiles = Get-ChildItem -Path . -Filter "*test-results*.xml" -Recurse
      Write-Host "Found test result files:"
      $foundFiles | ForEach-Object { Write-Host "  $($_.FullName)" }
      
      if ($foundFiles.Count -eq 0) {
        Write-Host "##vso[task.logissue type=warning]No test result files found matching pattern: $testResultsPath"
      } else {
        Write-Host "✓ Found $($foundFiles.Count) test result file(s)"
      }

- task: PublishTestResults@2
  displayName: 'Publish Test Results: ${{ parameters.testRunTitle }}'
  inputs:
    testResultsFormat: '${{ parameters.testResultsFormat }}'
    testResultsFiles: '${{ parameters.testResultsPath }}'
    testRunTitle: '${{ parameters.testRunTitle }}'
    mergeTestResults: ${{ parameters.mergeTestResults }}
    publishRunAttachments: ${{ parameters.publishRunAttachments }}
    failTaskOnFailedTests: false  # Don't fail the pipeline on test failures
  condition: always()  # Always publish results even if tests failed

- task: PublishBuildArtifacts@1
  displayName: 'Publish Test Results Artifact'
  inputs:
    pathToPublish: '$(System.DefaultWorkingDirectory)'
    artifactName: '${{ parameters.artifactName }}'
    artifactType: 'container'
    includeRootFolder: false
  condition: always()  # Always publish artifacts