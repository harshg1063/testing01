# Run Pytest Suite Step Template
# Executes pytest test suites with configurable parameters
# Parameters:
#   suitePath: Path to the test suite (e.g., 'audio', 'general', 'robotics')
#   testPattern: Test file pattern to run (default: 'test*.py')
#   pytestArgs: Additional pytest arguments (default: empty - CI/CD manages app deployment)
#   testTarget: Target device hostname for remote execution (default: 'localhost' for local execution)
#   workingDirectory: Base directory for tests (default: '$(Build.Repository.LocalPath)/tests/hp_app')

parameters:
- name: suitePath
  type: string
- name: testPattern
  type: string
  default: 'test*.py'
- name: pytestArgs
  type: string
  default: ''
- name: testTarget
  type: string
  default: 'localhost'
- name: workingDirectory
  type: string
  default: '$(Build.Repository.LocalPath)/tests/hp_app'
- name: testFilter
  type: string
  default: ''  # Optional -k filter for specific test methods
- name: markerFilter
  type: string
  default: ''  # Optional -m marker expression (e.g., "platform_machu13x and device_roo")
- name: specificTestFiles
  type: string
  default: ''  # Optional comma-separated list of specific test file names to execute
- name: testrailMilestoneId
  type: string
  default: ''  # Optional TestRail milestone ID for result upload
- name: testrailRunId
  type: string
  default: ''  # Optional TestRail run ID for re-execution or RC runs
- name: testrailCaseIds
  type: string
  default: ''  # Optional comma-separated TestRail case IDs (e.g., "C12345,C12346,C12347")

steps:
- task: PowerShell@2
  displayName: 'Run Pytest Suite: ${{ parameters.suitePath }}'
  env:
    IMAGE_BANK_REPO_PATH: $(IMAGE_BANK_REPO_PATH)
    TESTRAIL_API_KEY: $(TESTRAIL_API_KEY)
    TESTRAIL_USER_NAME: $(TESTRAIL_USER_NAME)
    TESTRAIL_URL: $(TESTRAIL_URL)
    TESTRAIL_PROJECT_ID: $(TESTRAIL_PROJECT_ID)
    TESTRAIL_SUITE_ID: $(TESTRAIL_SUITE_ID)
    PYTHONPATH: $(System.DefaultWorkingDirectory)
    SYSTEM_TEAMFOUNDATIONCOLLECTIONURI: $(System.TeamFoundationCollectionUri)
    SYSTEM_TEAMPROJECT: $(System.TeamProject)
    BUILD_BUILDID: $(Build.BuildId)
  inputs:
    targetType: 'inline'
    script: |
      $DebugPreference = "SilentlyContinue"
      $ErrorActionPreference = "Stop"
      
      # Determine if suitePath is absolute or relative
      $suitePath = "${{ parameters.suitePath }}"
      $isAbsolutePath = [System.IO.Path]::IsPathRooted($suitePath)
      
      if ($isAbsolutePath) {
        # Absolute path (from marker parser) - use directly
        $testPath = $suitePath
        Write-Host "Using absolute test path: $testPath"
      } else {
        # Relative path - join with working directory to verify it exists
        $baseDirectory = "${{ parameters.workingDirectory }}"
        $testPath = Join-Path $baseDirectory $suitePath
        Write-Host "Base directory: $baseDirectory"
        Write-Host "Suite path: $suitePath"
        Write-Host "Resolved test path: $testPath"
      }
      
      # Verify test path exists
      if (Test-Path $testPath) {
        Write-Host "[OK] Test path exists: $testPath"
      } else {
        Write-Error "[ERROR] Test path not found: $testPath"
        exit 1
      }
      
      # Set working directory to repository root for imports
      $repoRoot = "${{ parameters.workingDirectory }}" -replace '/tests/hp_app$', ''
      Write-Host "Repository root: $repoRoot"
      Set-Location $repoRoot
      Write-Host "Current directory: $(Get-Location)"
      
      # Check if specific test files are provided
      $specificFiles = "${{ parameters.specificTestFiles }}"
      $testTargets = @()
      
      if ($specificFiles -ne "") {
        Write-Host "Filtering to specific test files: $specificFiles"
        $fileList = $specificFiles -split ','
        foreach ($fileName in $fileList) {
          $fileName = $fileName.Trim()
          if ($fileName) {
            $fullPath = Join-Path $testPath $fileName
            if (Test-Path $fullPath) {
              # Convert back to relative path for pytest
              $relativePath = $fullPath.Replace("$repoRoot\", "").Replace("$repoRoot/", "")
              $testTargets += "`"$relativePath`""
              Write-Host "  [OK] Will execute: $relativePath"
            } else {
              Write-Warning "  [SKIP] File not found (skipping): $fileName"
            }
          }
        }
        
        if ($testTargets.Count -eq 0) {
          Write-Error "No valid test files found from the specific files list"
          exit 1
        }
      } else {
        # Use relative path for pytest instead of absolute path
        # This ensures pytest detects the correct rootdir (repository root, not tests/)
        if ($isAbsolutePath) {
          # If testPath is absolute, use it as-is
          Write-Host "Executing all tests in directory: $testPath"
          $testTargets = @("`"$testPath`"")
        } else {
          # If testPath was built from relative suitePath, use the original relative path
          Write-Host "Executing all tests in directory (relative): $suitePath"
          $testTargets = @("`"$suitePath`"")
        }
      }
      
      # Build pytest command with explicit rootdir and confcutdir
      # rootdir: Sets the root directory for pytest (affects import paths and test IDs)
      # This ensures pytest loads conftest.py files from the repository root down
      $pytestCmd = "python -m pytest --rootdir=`"$repoRoot`" --confcutdir=`"$repoRoot`""
      
      # Add any additional pytest arguments
      if ("${{ parameters.pytestArgs }}" -ne "") {
        $pytestCmd += " ${{ parameters.pytestArgs }}"
      }
      
      # Add test filter if specified
      $testFilter = "${{ parameters.testFilter }}"
      if ($testFilter -ne "") {
        $pytestCmd += " -k `"$testFilter`""
        Write-Host "Test filter: $testFilter"
      }
      
      # Add marker filter if specified
      $markerFilter = "${{ parameters.markerFilter }}"
      if ($markerFilter -ne "") {
        $pytestCmd += " -m `"$markerFilter`""
        Write-Host "Marker filter: $markerFilter"
      }
      
      # Add TestRail case ID filter if provided (passed to pytest hook)
      $testrailCaseIds = "${{ parameters.testrailCaseIds }}"
      if ($testrailCaseIds -ne "") {
        $pytestCmd += " --testrail-case-ids `"$testrailCaseIds`""
        Write-Host "TestRail case IDs: $testrailCaseIds (filtered by pytest hook)"
      }
      
      # Note: TestRail integration is handled by the aggregation stage, not during test execution
      # Tests are filtered by the pytest_collection_modifyitems hook if --testrail-case-ids is provided
      $testrailRunId = "${{ parameters.testrailRunId }}"
      if ($testrailRunId -ne "") {
        Write-Host "TestRail Run ID: $testrailRunId"
      }
      
      # Add test target (hostname for remote execution, or localhost for local)
      $pytestCmd += " --test-target ${{ parameters.testTarget }}"
      
      # Add the test targets (files or directory)
      $pytestCmd += " " + ($testTargets -join ' ')
      
      Write-Host "Executing: $pytestCmd"
      
      # Execute the pytest command
      Invoke-Expression $pytestCmd
    workingDirectory: '${{ parameters.workingDirectory }}'