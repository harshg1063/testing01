# Complete Test Execution Job Template with Matrix Strategy for Parallel Agent Execution
# 
# Purpose: Provides a flexible test execution framework supporting three distinct execution modes
# 
# Execution Modes:
# 1. Specific Device Mode (targetDeviceName provided):
#    - Executes tests on a single agent with exact device name match using Platform capability
#    - Use when: Testing specific hardware configuration or debugging device-specific issues
#    - Pool selection: Uses $(testAgentPool) with demand "Platform -equals <deviceName>"
#
# 2. Feature Matrix Mode (featureToTest provided, targetDeviceName empty, enableAgentSelection=true):
#    - Discovers all agents supporting the specified feature (e.g., "Audio Control")
#    - Creates matrix strategy to execute tests in parallel across all discovered agents
#    - Use when: Testing feature across entire device coverage or performing parallel validation
#    - Pool selection: Uses $(discoveryAgentPool) for discovery, $(testAgentPool) for execution
#
# 3. General Pool Mode (no featureToTest or enableAgentSelection=false):
#    - Uses default ADO agent pool behavior without capability filtering
#    - Use when: Running tests without specific device/feature requirements
#    - Pool selection: Uses $(testAgentPool) without capability demands
#
# Features:
# - Agent discovery based on device feature capabilities from device database
# - Matrix strategy for parallel execution across multiple matching agents
# - Integrated Appium server management for WinAppDriver automation
# - Automated myHP application installation from Azure DevOps builds
# - Flexible test selection (specific files or pattern matching)
# - All script paths and pool names use ADO variables for centralized configuration
#
# Required Variable Groups:
# - Test Configuration Variables: Contains pool names and all utility script paths
# - HP App Build Pipeline Variables: Contains Project ID for build downloads
#
# Usage Examples:
#   # Execute on specific device by exact name:
#   - template: templates/job templates/complete-test-execution-matrix-job.yml
#     parameters:
#       suitePath: 'tests/hp_app/audio'
#       targetDeviceName: 'HP EliteBook 845 G7 Notebook PC'  # Exact Platform capability value
#
#   # Execute on all agents supporting a feature (matrix mode):
#   - template: templates/job templates/complete-test-execution-matrix-job.yml
#     parameters:
#       suitePath: 'tests/hp_app/audio'
#       featureToTest: 'Audio Control'  # Will discover and execute on all compatible agents
#       enableAgentSelection: true
#
#   # Default pool behavior without targeting:
#   - template: templates/job templates/complete-test-execution-matrix-job.yml
#     parameters:
#       suitePath: 'tests/hp_app/audio'

parameters:
- name: suitePath
  type: string
  displayName: 'Test Suite Path'

- name: featureToTest
  type: string
  default: ''
  displayName: 'Feature to Test (leave empty for all agents)'

- name: deviceDatabase
  type: string
  default: 'consumer'
  displayName: 'Device Database Type (consumer, commercial, or both)'

- name: enableAgentSelection
  type: boolean
  default: true
  displayName: 'Enable Feature-based Agent Selection'

- name: targetDeviceName
  type: string
  default: ''
  displayName: 'Target Specific Device Name (capability Platform - overrides matrix strategy when provided)'

- name: testFiles
  type: string
  default: ''
  displayName: 'Specific Test Files (comma-separated, leave empty for pattern)'

- name: testPattern
  type: string
  default: 'test_*.py'
  displayName: 'Test Pattern (used when testFiles is empty)'

- name: pytestArgs
  type: string
  default: '-v --tb=short'
  displayName: 'Additional pytest Arguments'

- name: testTarget
  type: string
  default: 'localhost'
  displayName: 'Test Target (hostname for remote execution, localhost for local)'

- name: workingDirectory
  type: string
  default: '$(testSuiteBasePath)'
  displayName: 'Working Directory'

- name: pipelineId
  type: string
  default: '$(Production)'
  displayName: 'Pipeline ID for myHP App Installation'

jobs:
# ============================================================================
# Job 1: Agent Discovery (Conditional - Only for Feature Matrix Mode)
# ============================================================================
# Purpose: Discovers all agents supporting the specified feature and creates a matrix for parallel execution
# Condition: Runs only when enableAgentSelection=true AND targetDeviceName is empty (matrix mode)
# Pool: Uses $(discoveryAgentPool) - dedicated pool for running discovery scripts
# Outputs: 
# - SelectAgents.foundAgents: Boolean indicating if compatible agents were found
# - SelectAgents.agentMatrix: JSON matrix of agent names for parallel execution strategy
# - SelectAgents.agentCount: Number of compatible agents discovered
- ${{ if and(eq(parameters.enableAgentSelection, true), eq(parameters.targetDeviceName, '')) }}:
  - job: DiscoverCompatibleAgents
    displayName: 'Discover ${{ parameters.featureToTest }} Agents - ${{ parameters.suitePath }}'
    pool:
      name: $(discoveryAgentPool)
    steps:
    # Step 0: Checkout repository code
    # Purpose: Ensures the correct code version is available
    # For PR builds: Checks out the merge commit of the PR
    - checkout: self
    
    # Step 1: Validate parameter combination
    # Purpose: Ensures parameter values are compatible for matrix mode execution
    # Script: $(validateParametersScriptPath) - validate-pipeline-parameters.ps1
    # Validates: targetDeviceName must be empty when useMatrixMode=true
    - task: PowerShell@2
      displayName: 'Validate Parameter Combination'
      inputs:
        targetType: 'filePath'
        filePath: $(validateParametersScriptPath)
        arguments: '-useMatrixMode "True" -targetDeviceName "${{ parameters.targetDeviceName }}"'
    
    # Step 2a: Discover agents by feature (when feature specified)
    # Purpose: Queries device database to find all agents supporting the specified feature
    # Script: $(agentDiscoveryScriptPath) - discover-agents-for-feature.ps1
    # Output: Sets agentMatrix pipeline variable with JSON array of compatible agent names
    - ${{ if ne(parameters.featureToTest, '') }}:
      - task: PowerShell@2
        name: SelectAgents
        displayName: 'Discover agents for feature: ${{ parameters.featureToTest }}'
        inputs:
          targetType: 'filePath'
          filePath: $(agentDiscoveryScriptPath)
          arguments: '-features "${{ parameters.featureToTest }}"'
          workingDirectory: '$(Build.Repository.LocalPath)/devops/utils'
    
    # Step 2b: Set default behavior (when no feature specified)
    # Purpose: Allows matrix job to proceed without specific agent targeting
    # Sets foundAgents=true with empty matrix to use general pool behavior
    - ${{ if eq(parameters.featureToTest, '') }}:
      - task: PowerShell@2
        name: SelectAgents
        displayName: 'No feature specified - default behavior'
        inputs:
          targetType: 'inline'
          script: |
            Write-Host "No feature specified - will use default agent pool behavior"
            Write-Host "##vso[task.setvariable variable=foundAgents;isOutput=true]true"
            Write-Host "##vso[task.setvariable variable=agentMatrix;isOutput=true]"

# ============================================================================
# Job 2: Test Execution - Specific Device Mode
# ============================================================================
# Purpose: Executes tests on a single specific agent identified by exact device name
# Condition: Runs only when targetDeviceName parameter is provided (not empty)
# Pool: Uses $(testAgentPool) with Platform capability demand to target specific device
# Agent Selection: Uses "Platform -equals <deviceName>" demand to match exact device
- ${{ if ne(parameters.targetDeviceName, '') }}:
  - job: TestExecution_${{ replace(replace(parameters.targetDeviceName, ' ', '_'), '.', '_') }}
    displayName: '${{ parameters.targetDeviceName }} - ${{ parameters.testFiles }} - ${{ parameters.suitePath }}'
    pool:
      name: $(testAgentPool)
      demands:
      - Platform -equals ${{ parameters.targetDeviceName }}  # Exact match on Platform capability
    variables:
      currentAgentName: ${{ parameters.targetDeviceName }}
      agentCount: 1
    steps:
    # Step 0: Checkout repository code
    # Purpose: Ensures the correct code version is available for test execution
    # For PR builds: Checks out the merge commit of the PR
    - checkout: self
    
    # Step 1: Check and start Appium server
    # Purpose: Ensures WinAppDriver Appium server is running on the agent for UI automation
    # Script: $(appiumScriptPath) - start-appium-server.ps1
    # Behavior: Checks if Appium is already running; starts it if not running
    - task: PowerShell@2
      displayName: 'Check and Start Appium Server (Specific Device: ${{ parameters.targetDeviceName }})'
      inputs:
        targetType: 'filePath'
        filePath: $(appiumScriptPath)
        arguments: '-AgentName "${{ parameters.targetDeviceName }}" -Mode "specific-device"'
        workingDirectory: '$(Build.Repository.LocalPath)/devops/utils'

    # Step 2: Install myHP application
    # Purpose: Downloads and installs the myHP app package from Azure DevOps builds
    # Template: install-myhp.yml - handles version checking, download, certificate install, and package deployment
    # Uses: pipelineId parameter to identify which build pipeline to download from
    - template: ../step templates/install-myhp.yml
      parameters:
        pipelineId: ${{ parameters.pipelineId }}

    # Step 3: Set execution context for display
    # Purpose: Sets pipeline variables to display current execution context in logs
    # Script: $(executionContextScriptPath) - set-execution-context.ps1
    # Sets: TEST_CONTEXT variable with formatted execution details for log visibility
    - task: PowerShell@2
      displayName: 'Set Execution Context'
      inputs:
        targetType: 'filePath'
        filePath: $(executionContextScriptPath)
        arguments: '-TargetDeviceName "${{ parameters.targetDeviceName }}" -SuitePath "${{ parameters.suitePath }}" -TestFiles "${{ parameters.testFiles }}"'
        workingDirectory: '$(Build.Repository.LocalPath)/devops/utils'

    # Step 4: Prepare test execution context
    # Purpose: Determines test pattern and builds pytest arguments based on execution parameters
    # Script: $(testContextScriptPath) - prepare-test-execution-context.ps1
    # Output: Sets TEST_PATTERN and FEATURE_ARGS pipeline variables for pytest execution
    - task: PowerShell@2
      displayName: 'Determine Test Pattern and Feature/Device Context'
      inputs:
        targetType: 'filePath'
        filePath: $(testContextScriptPath)
        arguments: >-
          -SuitePath "${{ parameters.suitePath }}" 
          -TestFiles "${{ parameters.testFiles }}" 
          -TestPattern "${{ parameters.testPattern }}" 
          -PytestArgs "${{ parameters.pytestArgs }}" 
          -EnableAgentSelection "${{ parameters.enableAgentSelection }}" 
          -FeatureToTest "${{ parameters.featureToTest }}" 
          -TargetDeviceName "${{ parameters.targetDeviceName }}" 
          -CurrentAgentName "$(currentAgentName)"
        workingDirectory: '$(Build.Repository.LocalPath)/devops/utils'

    # Step 5: Execute pytest tests
    # Purpose: Runs the actual pytest test suite with configured parameters
    # Template: run-pytest-suite.yml - handles pytest execution with proper environment setup
    # Uses: TEST_PATTERN and FEATURE_ARGS variables set in previous step
    - template: ../step templates/run-pytest-suite.yml
      parameters:
        suitePath: ${{ parameters.suitePath }}
        testPattern: '$(TEST_PATTERN)'
        pytestArgs: '${{ parameters.pytestArgs }} $(FEATURE_ARGS)'
        testTarget: ${{ parameters.testTarget }}
        workingDirectory: ${{ parameters.workingDirectory }}

# ============================================================================
# Job 3: Test Execution - Feature Matrix Mode
# ============================================================================
# Purpose: Executes tests in parallel across all agents discovered in the DiscoverCompatibleAgents job
# Condition: Runs only when targetDeviceName is empty AND enableAgentSelection=true AND featureToTest is specified
# Dependencies: Requires DiscoverCompatibleAgents job to complete successfully
# Strategy: Uses matrix strategy with agent names from discovery job for parallel execution
# Pool: Uses $(testAgentPool) with Platform capability demand for each agent in the matrix
- ${{ if and(eq(parameters.targetDeviceName, ''), eq(parameters.enableAgentSelection, true), ne(parameters.featureToTest, '')) }}:
  - job: TestExecution_Matrix
    displayName: 'Matrix Test Execution'
    dependsOn: DiscoverCompatibleAgents
    condition: and(succeeded('DiscoverCompatibleAgents'), eq(dependencies.DiscoverCompatibleAgents.outputs['SelectAgents.foundAgents'], 'true'))
    strategy:
      matrix: $[ dependencies.DiscoverCompatibleAgents.outputs['SelectAgents.agentMatrix'] ]  # JSON matrix from discovery job
    pool:
      name: $(testAgentPool)
      demands:
      - Platform -equals $(agentName)  # agentName comes from matrix strategy
    variables:
      currentAgentName: $(agentName)
      agentCount: $[ dependencies.DiscoverCompatibleAgents.outputs['SelectAgents.agentCount'] ]
    steps:
    # Step 0: Checkout repository code
    # Purpose: Ensures the correct code version is available for test execution
    # For PR builds: Checks out the merge commit of the PR
    - checkout: self
    
    # Step 1: Check and start Appium server
    # Purpose: Ensures WinAppDriver Appium server is running on each matrix agent
    # Script: $(appiumScriptPath) - start-appium-server.ps1
    # Mode: "matrix" indicates this is part of parallel execution
    - task: PowerShell@2
      displayName: 'Check and Start Appium Server (Feature-based)'
      inputs:
        targetType: 'filePath'
        filePath: $(appiumScriptPath)
        arguments: '-AgentName "$(currentAgentName)" -FeatureToTest "${{ parameters.featureToTest }}" -Mode "matrix"'
        workingDirectory: '$(Build.Repository.LocalPath)/devops/utils'

    # Step 2: Install myHP application
    # Purpose: Downloads and installs myHP app package on each matrix agent
    # Template: install-myhp.yml - handles version checking, download, certificate install, and package deployment
    # Note: Each parallel job installs independently
    - template: ../step templates/install-myhp.yml
      parameters:
        pipelineId: ${{ parameters.pipelineId }}

    # Step 3: Set execution context for display
    # Purpose: Sets pipeline variables to display which agent and feature is being tested
    # Script: $(executionContextScriptPath) - set-execution-context.ps1
    # Includes: Feature name and current agent name for log visibility in parallel execution
    - task: PowerShell@2
      displayName: 'Set Execution Context'
      inputs:
        targetType: 'filePath'
        filePath: $(executionContextScriptPath)
        arguments: '-FeatureToTest "${{ parameters.featureToTest }}" -SuitePath "${{ parameters.suitePath }}" -TestFiles "${{ parameters.testFiles }}" -CurrentAgentName "$(currentAgentName)"'
        workingDirectory: '$(Build.Repository.LocalPath)/devops/utils'

    # Step 4: Prepare test execution context
    # Purpose: Determines test pattern and builds pytest arguments including feature context
    # Script: $(testContextScriptPath) - prepare-test-execution-context.ps1
    # Output: Sets TEST_PATTERN and FEATURE_ARGS with feature-specific markers for pytest
    - task: PowerShell@2
      displayName: 'Determine Test Pattern and Feature/Device Context'
      inputs:
        targetType: 'filePath'
        filePath: $(testContextScriptPath)
        arguments: >-
          -SuitePath "${{ parameters.suitePath }}" 
          -TestFiles "${{ parameters.testFiles }}" 
          -TestPattern "${{ parameters.testPattern }}" 
          -PytestArgs "${{ parameters.pytestArgs }}" 
          -EnableAgentSelection "${{ parameters.enableAgentSelection }}" 
          -FeatureToTest "${{ parameters.featureToTest }}" 
          -TargetDeviceName "${{ parameters.targetDeviceName }}" 
          -CurrentAgentName "$(currentAgentName)"
        workingDirectory: '$(Build.Repository.LocalPath)/devops/utils'

    # Step 5: Execute pytest tests
    # Purpose: Runs pytest test suite on this specific matrix agent
    # Template: run-pytest-suite.yml - handles pytest execution with feature context
    # Note: Executes in parallel with other matrix agents
    - template: ../step templates/run-pytest-suite.yml
      parameters:
        suitePath: ${{ parameters.suitePath }}
        testPattern: '$(TEST_PATTERN)'
        pytestArgs: '${{ parameters.pytestArgs }} $(FEATURE_ARGS)'
        testTarget: ${{ parameters.testTarget }}
        workingDirectory: ${{ parameters.workingDirectory }}

# ============================================================================
# Job 4: Test Execution - General Pool Mode
# ============================================================================
# Purpose: Executes tests using default ADO pool behavior without specific device or feature targeting
# Condition: Runs when targetDeviceName is empty AND (enableAgentSelection=false OR featureToTest is empty)
# Pool: Uses $(testAgentPool) without capability demands - ADO assigns any available agent
# Use Case: General testing without device-specific requirements or when feature discovery is disabled
- ${{ if and(eq(parameters.targetDeviceName, ''), or(eq(parameters.enableAgentSelection, false), eq(parameters.featureToTest, ''))) }}:
  - job: TestExecution_GeneralPool
    displayName: 'General Pool Test Execution'
    pool:
      name: $(testAgentPool)  # No demands - accepts any agent from pool
    variables:
      currentAgentName: $(Agent.Name)  # ADO built-in variable with actual agent name
      agentCount: 1
    steps:
    # Step 0: Checkout repository code
    # Purpose: Ensures the correct code version is available for test execution
    # For PR builds: Checks out the merge commit of the PR
    - checkout: self
    
    # Step 1: Check and start Appium server
    # Purpose: Ensures WinAppDriver Appium server is running on the assigned agent
    # Script: $(appiumScriptPath) - start-appium-server.ps1
    # Mode: "default" indicates standard pool assignment without targeting
    - task: PowerShell@2
      displayName: 'Check and Start Appium Server'
      inputs:
        targetType: 'filePath'
        filePath: $(appiumScriptPath)
        arguments: '-AgentName "$(Agent.Name)" -Mode "default"'
        workingDirectory: '$(Build.Repository.LocalPath)/devops/utils'

    # Step 2: Install myHP application
    # Purpose: Downloads and installs myHP app package from Azure DevOps builds
    # Template: install-myhp.yml - handles version checking, download, certificate install, and package deployment
    - template: ../step templates/install-myhp.yml
      parameters:
        pipelineId: ${{ parameters.pipelineId }}

    # Step 3: Set execution context for display
    # Purpose: Sets pipeline variables to display current execution context in logs
    # Script: $(executionContextScriptPath) - set-execution-context.ps1
    # Shows: Suite path and test files being executed on current agent
    - task: PowerShell@2
      displayName: 'Set Execution Context'
      inputs:
        targetType: 'filePath'
        filePath: $(executionContextScriptPath)
        arguments: '-SuitePath "${{ parameters.suitePath }}" -TestFiles "${{ parameters.testFiles }}"'
        workingDirectory: '$(Build.Repository.LocalPath)/devops/utils'

    # Step 4: Prepare test execution context
    # Purpose: Determines test pattern and builds pytest arguments
    # Script: $(testContextScriptPath) - prepare-test-execution-context.ps1
    # Output: Sets TEST_PATTERN and FEATURE_ARGS pipeline variables for pytest
    - task: PowerShell@2
      displayName: 'Determine Test Pattern and Feature/Device Context'
      inputs:
        targetType: 'filePath'
        filePath: $(testContextScriptPath)
        arguments: >-
          -SuitePath "${{ parameters.suitePath }}" 
          -TestFiles "${{ parameters.testFiles }}" 
          -TestPattern "${{ parameters.testPattern }}" 
          -PytestArgs "${{ parameters.pytestArgs }}" 
          -EnableAgentSelection "${{ parameters.enableAgentSelection }}" 
          -FeatureToTest "${{ parameters.featureToTest }}" 
          -TargetDeviceName "${{ parameters.targetDeviceName }}" 
          -CurrentAgentName "$(currentAgentName)"
        workingDirectory: '$(Build.Repository.LocalPath)/devops/utils'

    # Step 5: Execute pytest tests
    # Purpose: Runs the actual pytest test suite with configured parameters
    # Template: run-pytest-suite.yml - handles pytest execution with proper environment setup
    - template: ../step templates/run-pytest-suite.yml
      parameters:
        suitePath: ${{ parameters.suitePath }}
        testPattern: '$(TEST_PATTERN)'
        pytestArgs: '${{ parameters.pytestArgs }} $(FEATURE_ARGS)'
        testTarget: ${{ parameters.testTarget }}
        workingDirectory: ${{ parameters.workingDirectory }}
