# Integration Test Execution Job Template with Custom Marker Filtering
#
# Purpose: Extended version of marker-based-test-execution-job.yml that supports
# filtering test discovery by a custom pytest marker (e.g., @pytest.mark.integration).
#
# This template is used by integration_module_execution.yaml pipeline.
# For regular pipelines (daily, RC, MAT, OTA, PR), use marker-based-test-execution-job.yml.
#
# Key difference from marker-based-test-execution-job.yml:
# - Adds discoveryMarkerFilter parameter for AST-level custom marker filtering
# - Uses parse-test-markers-integration.py (extended discovery script with --custom-marker support)
# - additionalMarkerFilter is ONLY used for pytest -m runtime filtering (not for discovery)
#
# Execution Flow:
# 1. Discovery Job (ASQE-QAMA-VM pool):
#    - Parses test files using parse-test-markers-integration.py
#    - If discoveryMarkerFilter is set, only tests with that custom marker generate matrix entries
#    - This reduces agent allocation to only platforms that have matching tests
#
# 2. Execution Jobs (ASQE-QAMA-General pool):
#    - Same as marker-based-test-execution-job.yml
#
# Usage Example:
#   - template: templates/job templates/integration-test-execution-job.yml
#     parameters:
#       suitePath: '$(testSuiteBasePath)/audio'
#       discoveryMarkerFilter: 'integration'
#       additionalMarkerFilter: 'integration'

parameters:
- name: workingDirectory
  type: string
  default: ''
  displayName: 'Working Directory for steps (optional)'
- name: suitePath
  type: string
  displayName: 'Test Suite Path'

- name: artifactNamePrefix
  type: string
  default: ''
  displayName: 'Artifact name prefix (e.g., mat-build-)'

- name: pipelineId
  type: string
  default: '$(Production)'
  displayName: 'Pipeline ID for myHP App Installation'

- name: buildId
  type: string
  default: ''
  displayName: 'Build ID (numeric) for myHP App Installation'

- name: buildVersion
  type: string
  default: ''
  displayName: 'Build Version (string like 53.42601.121.0) for myHP App Installation'

- name: pytestArgs
  type: string
  default: '-v --tb=short'
  displayName: 'Additional pytest Arguments'

- name: milestoneType
  type: string
  default: ''
  displayName: 'TestRail Milestone Type (Daily or RC, empty to skip milestone creation)'

- name: testFilter
  type: string
  default: ''
  displayName: 'Test filter for pytest -k option'

- name: testrailRunId
  type: string
  default: ''
  displayName: 'TestRail Run ID (optional, for re-execution or RC runs)'

- name: additionalMarkerFilter
  type: string
  default: ''
  displayName: 'Additional Marker Filter for pytest -m (combined with automatic platform/device filter using AND)'

- name: discoveryMarkerFilter
  type: string
  default: ''
  displayName: 'Discovery Marker Filter (single marker name to filter tests during AST-based discovery, e.g., "integration")'

- name: requireRobotics
  type: boolean
  default: false
  displayName: 'Restrict agent selection to agents with Robotics=True capability'

- name: moduleName
  type: string
  default: ''
  displayName: 'Module Name (used to retrieve modified test files from stage outputs)'

- name: useOtaInstall
  type: boolean
  default: false
  displayName: 'Use OTA Installation (baseline→upgrade) instead of clean install'

- name: checkoutImageBank
  type: boolean
  default: false
  displayName: 'Checkout imagebank repository for image comparison tests'

jobs:
# ============================================================================
# Job 1: Discovery - Parse Markers and Generate Agent Matrix
# ============================================================================
- job: DiscoverAgents
  displayName: "Discover Compatible Agents for ${{ replace(parameters.suitePath, '$(testSuiteBasePath)/', '') }}"
  pool:
    name: ASQE-QAMA-VM
  
  variables:
    requirementsFile: '$(Build.ArtifactStagingDirectory)/marker-requirements.json'
    ${{ if ne(parameters.moduleName, '') }}:
      specificTestFiles: $[ stageDependencies.AnalyzePR.ProcessPR.outputs['AnalyzeFiles.testfiles_${{ parameters.moduleName }}'] ]
    ${{ if eq(parameters.moduleName, '') }}:
      specificTestFiles: ''
  
  steps:
  - checkout: self
    displayName: 'Checkout Test Repository (Clean)'
    clean: true

  # Step 1a: Download TestRail categorization (if testrailRunId provided)
  - ${{ if ne(parameters.testrailRunId, '') }}:
    - task: DownloadPipelineArtifact@2
      displayName: 'Download TestRail Categorization'
      inputs:
        source: 'current'
        artifact: 'TestRail Categorization'
        path: '$(Pipeline.Workspace)/testrail-categorization'
  
  - ${{ if ne(parameters.testrailRunId, '') }}:
    - task: PowerShell@2
      name: ParseTestRailCases
      displayName: 'Extract Case IDs for ${{ replace(parameters.suitePath, ''$(testSuiteBasePath)/'', '''') }}'
      inputs:
        targetType: 'inline'
        script: |
          $jsonPath = "$(Pipeline.Workspace)/testrail-categorization/testrail-suite-categorization.json"
          $categorization = Get-Content $jsonPath -Raw | ConvertFrom-Json
          
          # Extract suite name from path (e.g., "tests/hp_app/pen_control" -> "pen_control")
          $suitePath = "${{ parameters.suitePath }}"
          $suiteName = $suitePath.Split('/')[-1]
          
          $caseIds = ""
          if ($categorization.suites.$suiteName) {
            $caseIds = $categorization.suites.$suiteName.case_ids -join ','
            $count = $categorization.suites.$suiteName.count
            Write-Host "##[section]Suite '$suiteName' has $count test cases from TestRail run ${{ parameters.testrailRunId }}"
            Write-Host "Case IDs: $caseIds"
          } else {
            Write-Host "##[warning]Suite '$suiteName' has no tests in TestRail run ${{ parameters.testrailRunId }}"
          }
          
          Write-Host "##vso[task.setvariable variable=testrailCaseIds;isOutput=true]$caseIds"
  
  # Step 1b: Parse test markers using integration-aware script
  # Uses parse-test-markers-integration.py which supports --custom-marker for AST-level filtering
  - ${{ if ne(parameters.moduleName, '') }}:
    - ${{ if ne(parameters.testrailRunId, '') }}:
      - ${{ if ne(parameters.discoveryMarkerFilter, '') }}:
        - task: PythonScript@0
          displayName: 'Parse Test Markers from ${{ parameters.suitePath }} (Modified Files + TestRail + Marker Filter)'
          continueOnError: true
          inputs:
            scriptSource: 'filePath'
            scriptPath: '$(Build.Repository.LocalPath)/devops/utils/test-execution/parse-test-markers-integration.py'
            arguments: '--suite-path "${{ parameters.suitePath }}" --output "$(requirementsFile)" --specific-files "$(specificTestFiles)" --testrail-cases "$(ParseTestRailCases.testrailCaseIds)" --custom-marker "${{ parameters.discoveryMarkerFilter }}"'
            workingDirectory: '$(Build.Repository.LocalPath)'
            failOnStderr: false
      - ${{ if eq(parameters.discoveryMarkerFilter, '') }}:
        - task: PythonScript@0
          displayName: 'Parse Test Markers from ${{ parameters.suitePath }} (Modified Files + TestRail Filter)'
          continueOnError: true
          inputs:
            scriptSource: 'filePath'
            scriptPath: '$(Build.Repository.LocalPath)/devops/utils/test-execution/parse-test-markers-integration.py'
            arguments: '--suite-path "${{ parameters.suitePath }}" --output "$(requirementsFile)" --specific-files "$(specificTestFiles)" --testrail-cases "$(ParseTestRailCases.testrailCaseIds)"'
            workingDirectory: '$(Build.Repository.LocalPath)'
            failOnStderr: false
    - ${{ if eq(parameters.testrailRunId, '') }}:
      - ${{ if ne(parameters.discoveryMarkerFilter, '') }}:
        - task: PythonScript@0
          displayName: 'Parse Test Markers from ${{ parameters.suitePath }} (Modified Files + Marker Filter)'
          continueOnError: true
          inputs:
            scriptSource: 'filePath'
            scriptPath: '$(Build.Repository.LocalPath)/devops/utils/test-execution/parse-test-markers-integration.py'
            arguments: '--suite-path "${{ parameters.suitePath }}" --output "$(requirementsFile)" --specific-files "$(specificTestFiles)" --custom-marker "${{ parameters.discoveryMarkerFilter }}"'
            workingDirectory: '$(Build.Repository.LocalPath)'
            failOnStderr: false
      - ${{ if eq(parameters.discoveryMarkerFilter, '') }}:
        - task: PythonScript@0
          displayName: 'Parse Test Markers from ${{ parameters.suitePath }} (Modified Files Only)'
          continueOnError: true
          inputs:
            scriptSource: 'filePath'
            scriptPath: '$(Build.Repository.LocalPath)/devops/utils/test-execution/parse-test-markers-integration.py'
            arguments: '--suite-path "${{ parameters.suitePath }}" --output "$(requirementsFile)" --specific-files "$(specificTestFiles)"'
            workingDirectory: '$(Build.Repository.LocalPath)'
            failOnStderr: false
  
  - ${{ if eq(parameters.moduleName, '') }}:
    - ${{ if ne(parameters.testrailRunId, '') }}:
      - ${{ if ne(parameters.discoveryMarkerFilter, '') }}:
        - task: PythonScript@0
          displayName: 'Parse Test Markers from ${{ parameters.suitePath }} (TestRail + Marker Filter)'
          continueOnError: true
          inputs:
            scriptSource: 'filePath'
            scriptPath: '$(Build.Repository.LocalPath)/devops/utils/test-execution/parse-test-markers-integration.py'
            arguments: '--suite-path "${{ parameters.suitePath }}" --output "$(requirementsFile)" --testrail-cases "$(ParseTestRailCases.testrailCaseIds)" --custom-marker "${{ parameters.discoveryMarkerFilter }}"'
            workingDirectory: '$(Build.Repository.LocalPath)'
            failOnStderr: false
      - ${{ if eq(parameters.discoveryMarkerFilter, '') }}:
        - task: PythonScript@0
          displayName: 'Parse Test Markers from ${{ parameters.suitePath }} (TestRail Filter)'
          continueOnError: true
          inputs:
            scriptSource: 'filePath'
            scriptPath: '$(Build.Repository.LocalPath)/devops/utils/test-execution/parse-test-markers-integration.py'
            arguments: '--suite-path "${{ parameters.suitePath }}" --output "$(requirementsFile)" --testrail-cases "$(ParseTestRailCases.testrailCaseIds)"'
            workingDirectory: '$(Build.Repository.LocalPath)'
            failOnStderr: false
    - ${{ if eq(parameters.testrailRunId, '') }}:
      - ${{ if ne(parameters.discoveryMarkerFilter, '') }}:
        - task: PythonScript@0
          displayName: 'Parse Test Markers from ${{ parameters.suitePath }} (Marker Filter)'
          continueOnError: true
          inputs:
            scriptSource: 'filePath'
            scriptPath: '$(Build.Repository.LocalPath)/devops/utils/test-execution/parse-test-markers-integration.py'
            arguments: '--suite-path "${{ parameters.suitePath }}" --output "$(requirementsFile)" --custom-marker "${{ parameters.discoveryMarkerFilter }}"'
            workingDirectory: '$(Build.Repository.LocalPath)'
            failOnStderr: false
      - ${{ if eq(parameters.discoveryMarkerFilter, '') }}:
        - task: PythonScript@0
          displayName: 'Parse Test Markers from ${{ parameters.suitePath }}'
          continueOnError: true
          inputs:
            scriptSource: 'filePath'
            scriptPath: '$(Build.Repository.LocalPath)/devops/utils/test-execution/parse-test-markers-integration.py'
            arguments: '--suite-path "${{ parameters.suitePath }}" --output "$(requirementsFile)"'
            workingDirectory: '$(Build.Repository.LocalPath)'
            failOnStderr: false
  
  # Step 2: Create or get TestRail milestone (if milestoneType provided)
  - ${{ if ne(parameters.milestoneType, '') }}:
    - task: PowerShell@2
      name: CreateMilestone
      displayName: 'Create or Get TestRail ${{ parameters.milestoneType }} Milestone'
      env:
        TESTRAIL_API_KEY: $(TESTRAIL_API_KEY)
        TESTRAIL_USER_NAME: $(TESTRAIL_USER_NAME)
        TESTRAIL_URL: $(TESTRAIL_URL)
        TESTRAIL_PROJECT_ID: $(TESTRAIL_PROJECT_ID)
      inputs:
        targetType: 'filePath'
        filePath: '$(Build.Repository.LocalPath)/devops/utils/test-execution/create-or-get-testrail-milestone.ps1'
        arguments: '-milestoneType "${{ parameters.milestoneType }}" -testrailUrl "$(TESTRAIL_URL)" -testrailUser "$(TESTRAIL_USER_NAME)" -testrailApiKey "$(TESTRAIL_API_KEY)" -projectId "$(TESTRAIL_PROJECT_ID)"'
        workingDirectory: '$(Build.Repository.LocalPath)/devops/utils/test-execution'
  
  # Step 3: Generate agent matrix from requirements
  - ${{ if parameters.requireRobotics }}:
    - task: PowerShell@2
      name: DiscoverAgents
      displayName: 'Generate Agent Execution Matrix (Robotics agents only)'
      continueOnError: true
      env:
        AZUREDEVOPSPAT: $(AzureDevOpsPAT)
      inputs:
        targetType: 'filePath'
        filePath: '$(Build.SourcesDirectory)/devops/utils/test-execution/generate-marker-matrix.ps1'
        arguments: '-RequirementsFile "$(requirementsFile)" -AdditionalMarkerFilter "${{ parameters.additionalMarkerFilter }}" -RequireRobotics'
        workingDirectory: '$(Build.SourcesDirectory)/devops/utils/test-execution'
        failOnStderr: false
  - ${{ if not(parameters.requireRobotics) }}:
    - task: PowerShell@2
      name: DiscoverAgents
      displayName: 'Generate Agent Execution Matrix'
      continueOnError: true
      env:
        AZUREDEVOPSPAT: $(AzureDevOpsPAT)
      inputs:
        targetType: 'filePath'
        filePath: '$(Build.SourcesDirectory)/devops/utils/test-execution/generate-marker-matrix.ps1'
        arguments: '-RequirementsFile "$(requirementsFile)" -AdditionalMarkerFilter "${{ parameters.additionalMarkerFilter }}"'
        workingDirectory: '$(Build.SourcesDirectory)/devops/utils/test-execution'
        failOnStderr: false

# ============================================================================
# Job 2: Test Execution - Marker-Based Matrix Strategy
# ============================================================================
- job: TestExecution_Markers
  displayName: 'Executing on'
  dependsOn: DiscoverAgents
  condition: and(in(dependencies.DiscoverAgents.result, 'Succeeded', 'SucceededWithIssues'), eq(dependencies.DiscoverAgents.outputs['DiscoverAgents.foundTests'], 'true'), eq(dependencies.DiscoverAgents.outputs['DiscoverAgents.foundAgents'], 'true'))
  timeoutInMinutes: 240
  cancelTimeoutInMinutes: 5
  
  strategy:
    matrix: $[ dependencies.DiscoverAgents.outputs['DiscoverAgents.agentMatrix'] ]
  
  pool:
    name: ASQE-QAMA-General
    demands:
    - Agent.Name -equals $(agentName)
  
  variables:
    ${{ if ne(parameters.moduleName, '') }}:
      specificTestFiles: $[ stageDependencies.AnalyzePR.ProcessPR.outputs['AnalyzeFiles.testfiles_${{ parameters.moduleName }}'] ]
    ${{ if eq(parameters.moduleName, '') }}:
      specificTestFiles: ''
    ${{ if ne(variables.deviceName, '') }}:
      deviceSuffixForResults: '-$(deviceName)'
      deviceSuffixForRuns: ' x $(deviceName)'
    ${{ if eq(variables.deviceName, '') }}:
      deviceSuffixForResults: ''
      deviceSuffixForRuns: ''
    
    repoRoot: '$(Build.SourcesDirectory)'
    
    CURRENT_PLATFORM: $(platformName)
    CONNECTED_DEVICE: $(deviceName)
    
    ${{ if ne(parameters.milestoneType, '') }}:
      TESTRAIL_MILESTONE_ID: $[ dependencies.DiscoverAgents.outputs['CreateMilestone.TESTRAIL_MILESTONE_ID'] ]
    ${{ if ne(parameters.testrailRunId, '') }}:
      TESTRAIL_RUN_ID: ${{ parameters.testrailRunId }}
      TESTRAIL_CASE_IDS: $[ dependencies.DiscoverAgents.outputs['ParseTestRailCases.testrailCaseIds'] ]
  
  steps:
  
  - ${{ if eq(parameters.checkoutImageBank, true) }}:
    - checkout: imagebank
      displayName: 'Checkout Image Bank Repository'
  
  - checkout: self
    displayName: 'Checkout Test Repository'
    clean: true
  
  - ${{ if eq(parameters.checkoutImageBank, true) }}:
    - task: PowerShell@2
      displayName: 'Flatten Repository Directory Structure'
      inputs:
        targetType: 'inline'
        script: |
          $ErrorActionPreference = "Stop"
          $repoSubDir = "$(Build.SourcesDirectory)/asqe-qama"
          $targetDir = "$(Build.SourcesDirectory)"
          
          Write-Host "Checking for nested repository structure..."
          
          if (Test-Path $repoSubDir) {
            Write-Host "Found repository at: $repoSubDir"
            Write-Host "Moving contents to: $targetDir"
            
            Get-ChildItem -Path $repoSubDir -Force | ForEach-Object {
              $destination = Join-Path $targetDir $_.Name
              Write-Host "Moving: $($_.Name)"
              
              if (Test-Path $destination) {
                Remove-Item -Path $destination -Recurse -Force -ErrorAction SilentlyContinue
              }
              
              Move-Item -Path $_.FullName -Destination $targetDir -Force
            }
            
            Remove-Item -Path $repoSubDir -Force -ErrorAction SilentlyContinue
            
            Write-Host "Repository structure flattened successfully"
            Write-Host "Repository root is now: $targetDir"
            
            Write-Host ""
            Write-Host "Verifying directory structure after flatten:"
            if (Test-Path "$targetDir/tests/hp_app/conftest.py") {
              Write-Host "[OK] tests/hp_app/conftest.py exists"
            } else {
              Write-Host "[ERROR] tests/hp_app/conftest.py is MISSING!"
            }
            if (Test-Path "$targetDir/tests/conftest.py") {
              Write-Host "[OK] tests/conftest.py exists"
            } else {
              Write-Host "[ERROR] tests/conftest.py is MISSING!"
            }
            if (Test-Path "$targetDir/tests/pytest.ini") {
              Write-Host "[OK] tests/pytest.ini exists"
            } else {
              Write-Host "[ERROR] tests/pytest.ini is MISSING!"
            }
          } else {
            Write-Host "Repository already at correct location: $targetDir"
          }
      continueOnError: false
  
  - task: PowerShell@2
    displayName: 'Update Job Display Name'
    inputs:
      targetType: 'filePath'
      filePath: '$(repoRoot)/devops/utils/test-execution/update-job-display-name.ps1'
      arguments: '-DisplayName "$(displayName)"'
  
  - task: PowerShell@2
    displayName: 'Display Execution Context'
    inputs:
      targetType: 'filePath'
      filePath: '$(repoRoot)/devops/utils/test-execution/display-execution-context.ps1'
      arguments: '-PlatformName "$(platformName)" -DeviceName "$(deviceName)" -AgentPlatform "$(agentPlatform)" -AgentName "$(agentName)" -ActualAgentName "$(Agent.Name)" -ActualMachineName "$(Agent.MachineName)"'
  
  - task: PowerShell@2
    displayName: 'Check and Start Appium Server'
    inputs:
      targetType: 'filePath'
      filePath: $(appiumScriptPath)
      arguments: '-AgentName "$(Agent.Name)" -Mode "marker-based"'
      workingDirectory: '$(repoRoot)/devops/utils'
  
  - template: ../step templates/install-myhp.yml
    parameters:
      pipelineId: ${{ parameters.pipelineId }}
      buildVersion: ${{ parameters.buildVersion }}
      buildId: ${{ parameters.buildId }}
      ${{ if or(ne(parameters.buildId, ''), ne(parameters.buildVersion, '')) }}:
        buildVersionToDownload: specific
      ${{ else }}:
        buildVersionToDownload: latest
  
  - task: PowerShell@2
    displayName: 'Set Test Execution Context'
    inputs:
      targetType: 'filePath'
      filePath: '$(repoRoot)/devops/utils/test-execution/display-test-context.ps1'
      arguments: '-SuitePath "${{ parameters.suitePath }}" -PlatformMarker "$env:CURRENT_PLATFORM" -DeviceMarker "$env:CONNECTED_DEVICE" -WorkingDirectory "$(repoRoot)"'
  
  - ${{ if ne(variables.TESTRAIL_CASE_IDS, '') }}:
      - task: PowerShell@2
        displayName: 'Collect Tests for $(platformName) × $(deviceName)'
        continueOnError: true
        env:
          CURRENT_PLATFORM: $(platformName)
          CONNECTED_DEVICE: $(deviceName)
          PYTHONPATH: $(System.DefaultWorkingDirectory)
        inputs:
          targetType: 'filePath'
          filePath: '$(Build.Repository.LocalPath)/devops/utils/test-execution/collect-tests.ps1'
          arguments: '-SuitePath "${{ parameters.suitePath }}" -PlatformName "$(platformName)" -DeviceName "$(deviceName)" -PytestArgs "${{ parameters.pytestArgs }}" -AdditionalMarkerFilter "${{ parameters.additionalMarkerFilter }}" -WorkingDirectory "${{ parameters.workingDirectory }}" -SpecificTestFiles "$(specificTestFiles)" -TestrailCaseIds "$(TESTRAIL_CASE_IDS)"'
          workingDirectory: '${{ parameters.workingDirectory }}'
  - ${{ if eq(variables.TESTRAIL_CASE_IDS, '') }}:
      - task: PowerShell@2
        displayName: 'Collect Tests for $(platformName) $(deviceSuffixForRuns)'
        continueOnError: true
        env:
          CURRENT_PLATFORM: $(platformName)
          CONNECTED_DEVICE: $(deviceName)
          PYTHONPATH: $(System.DefaultWorkingDirectory)
        inputs:
          targetType: 'filePath'
          filePath: '$(Build.Repository.LocalPath)/devops/utils/test-execution/collect-tests.ps1'
          arguments: '-SuitePath "${{ parameters.suitePath }}" -PlatformName "$(platformName)" -DeviceName "$(deviceName)" -PytestArgs "${{ parameters.pytestArgs }}" -AdditionalMarkerFilter "${{ parameters.additionalMarkerFilter }}" -WorkingDirectory "${{ parameters.workingDirectory }}" -SpecificTestFiles "$(specificTestFiles)"'
          workingDirectory: '${{ parameters.workingDirectory }}'
  
  - task: PowerShell@2
    displayName: 'Build Marker Filter'
    name: BuildMarkerFilter
    inputs:
      targetType: 'filePath'
      filePath: '$(repoRoot)/devops/utils/test-execution/build-marker-filter.ps1'
      arguments: '-PlatformName "$(platformName)" -DeviceName "$(deviceName)" -AdditionalMarkerFilter "${{ parameters.additionalMarkerFilter }}"'
  
  - powershell: |
      $date = Get-Date -Format "yyyyMMdd-HHmmss"
      Write-Host "##vso[task.setvariable variable=dateSuffix]$date"
    displayName: 'Set Date Suffix Variable'
    condition: always()
  - template: ../step templates/run-pytest-suite.yml
    parameters:
      suitePath: ${{ parameters.suitePath }}
      testPattern: 'test_*.py'
      pytestArgs: '${{ parameters.pytestArgs }} --junit-xml=$(Agent.TempDirectory)/test-results-$(platformName)$(deviceSuffixForResults)-$(dateSuffix).xml'
      markerFilter: '$(BuildMarkerFilter.markerFilter)'
      testTarget: 'localhost'
      workingDirectory: '$(repoRoot)'
      specificTestFiles: '$(specificTestFiles)'
      testFilter: ${{ parameters.testFilter }}
      ${{ if ne(parameters.testrailRunId, '') }}:
        testrailCaseIds: '$(TESTRAIL_CASE_IDS)'
        testrailRunId: ${{ parameters.testrailRunId }}
      ${{ if ne(parameters.milestoneType, '') }}:
        testrailMilestoneId: '$(TESTRAIL_MILESTONE_ID)'
  
  - task: PublishPipelineArtifact@1
    displayName: 'Publish Test Results XML'
    condition: always()
    continueOnError: true
    inputs:
      targetPath: '$(Agent.TempDirectory)/test-results-$(platformName)$(deviceSuffixForResults)-$(dateSuffix).xml'
      artifactName: '${{ parameters.artifactNamePrefix }}test-results-$(platformName)$(deviceSuffixForResults)-$(dateSuffix)'
      publishLocation: 'pipeline'
  
  - task: PublishTestResults@2
    displayName: 'Publish Test Results to Tests Tab'
    condition: always()
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '$(Agent.TempDirectory)/test-results-$(platformName)$(deviceSuffixForResults)-$(dateSuffix).xml'
      testRunTitle: 'Tests: $(platformName)$(deviceSuffixForRuns)'
      mergeTestResults: false
      failTaskOnFailedTests: false
  
  - task: PublishBuildArtifacts@1
    displayName: 'Publish Test Artifacts'
    condition: always()
    continueOnError: true
    inputs:
      PathtoPublish: '$(repoRoot)/results'
      ArtifactName: 'test-artifacts-$(platformName)$(deviceSuffixForResults)-$(dateSuffix)'
      publishLocation: 'Container'