# Dynamic Test Suite Job Template
# Creates parallel jobs for test files via explicit selection OR auto-discovery
# Parameters:
#   suitePath: Path to the test suite (e.g., 'audio', 'general', 'robotics')
#   testFiles: Array of test files to run - YOUR SELECTION IS FINAL
#             If provided, these exact tests run regardless of other parameters
#   autoDiscover: Enable automatic test discovery (default: false)
#   discoveryPath: Directory path to discover tests from (required if autoDiscover=true)
#   testPattern: File pattern for discovery (default: 'test_*.py')
#   testTypes: Types of tests to include in discovery ('robotics', 'localization', 'general')
#             Only used when autoDiscover=true, filters discovered files by naming
#   pytestArgs: Additional pytest arguments (default: empty - CI/CD manages app deployment)
#   mobileDevice: Mobile device identifier (default: 'localhost')
#   workingDirectory: Base directory for tests (default: standard path)
#   dependsOn: Job dependencies (optional)
#   condition: Job condition (optional)

parameters:
- name: suitePath
  type: string
- name: testFiles
  type: object
  default: []
- name: autoDiscover
  type: boolean
  default: false
- name: discoveryPath
  type: string
  default: ''
- name: testPattern
  type: string
  default: 'test_*.py'
- name: testTypes
  type: object
  default: ['general']  # General tests by default
- name: pytestArgs
  type: string
  default: ''
- name: mobileDevice
  type: string
  default: 'localhost'
- name: workingDirectory
  type: string
  default: '$(Build.Repository.LocalPath)/tests/hp_app'
- name: dependsOn
  type: object
  default: []
- name: condition
  type: string
  default: ''

jobs:
- ${{ if and(ne(length(parameters.testFiles), 0), eq(parameters.autoDiscover, false)) }}:
  - ${{ each testFile in parameters.testFiles }}:
    - job: Test_${{ parameters.suitePath }}_${{ replace(replace(testFile, 'test_', ''), '.py', '') }}
      displayName: '${{ parameters.suitePath }}: ${{ testFile }} [Explicit]'
      ${{ if ne(length(parameters.dependsOn), 0) }}:
        dependsOn: ${{ parameters.dependsOn }}
      ${{ if ne(parameters.condition, '') }}:
        condition: ${{ parameters.condition }}
      steps:
      - template: ../step templates/run-pytest-suite.yml
        parameters:
          suitePath: ${{ parameters.suitePath }}
          testPattern: '${{ parameters.suitePath }}\${{ testFile }}'
          pytestArgs: ${{ parameters.pytestArgs }}
          mobileDevice: ${{ parameters.mobileDevice }}
          workingDirectory: ${{ parameters.workingDirectory }}

- ${{ if eq(parameters.autoDiscover, true) }}:
  - job: DiscoverAndRunTests
    displayName: 'Discover Tests: ${{ parameters.suitePath }}'
    ${{ if ne(length(parameters.dependsOn), 0) }}:
      dependsOn: ${{ parameters.dependsOn }}
    ${{ if ne(parameters.condition, '') }}:
      condition: ${{ parameters.condition }}
    steps:
    # Discover tests dynamically
    - powershell: |
        $discoveryPath = "${{ parameters.discoveryPath }}\${{ parameters.suitePath }}"
        $testPattern = "${{ parameters.testPattern }}"
        $testTypes = @('${{ join(''',''', parameters.testTypes) }}')
        
        Write-Host "Discovering tests in: $discoveryPath"
        Write-Host "Pattern: $testPattern"
        Write-Host "Allowed types: $($testTypes -join ', ')"
        
        # Find all test files matching pattern
        $allTests = Get-ChildItem -Path $discoveryPath -Name $testPattern -Recurse
        Write-Host "Found $($allTests.Count) total test files"
        
        # Filter by test types
        $filteredTests = @()
        foreach ($test in $allTests) {
            $include = $false
            if ($testTypes -contains 'robotics' -and $test -like '*robotics*') { $include = $true }
            if ($testTypes -contains 'localization' -and $test -like '*localization*') { $include = $true }
            if ($testTypes -contains 'general' -and $test -notlike '*robotics*' -and $test -notlike '*localization*') { $include = $true }
            
            if ($include) {
                $filteredTests += $test
                Write-Host "  ✓ $test"
            } else {
                Write-Host "  ✗ $test (filtered out)"
            }
        }
        
        Write-Host "Running $($filteredTests.Count) filtered tests"
        
        # Set variable for pytest execution
        $testFilesList = ($filteredTests -join ' ')
        Write-Host "##vso[task.setvariable variable=DISCOVERED_TESTS]$testFilesList"
      displayName: 'Discover Tests'
      workingDirectory: ${{ parameters.workingDirectory }}

    # Run discovered tests
    - template: ../step templates/run-pytest-suite.yml
      parameters:
        suitePath: ${{ parameters.suitePath }}
        testPattern: '${{ parameters.suitePath }}\$(DISCOVERED_TESTS)'
        pytestArgs: ${{ parameters.pytestArgs }}
        mobileDevice: ${{ parameters.mobileDevice }}
        workingDirectory: ${{ parameters.workingDirectory }}

- ${{ if and(eq(length(parameters.testFiles), 0), eq(parameters.autoDiscover, false)) }}:
  - job: NoTestsSpecified
    displayName: 'No Tests Specified'
    ${{ if ne(length(parameters.dependsOn), 0) }}:
      dependsOn: ${{ parameters.dependsOn }}
    ${{ if ne(parameters.condition, '') }}:
      condition: ${{ parameters.condition }}
    steps:
    - script: |
        echo "##vso[task.logissue type=warning]No tests specified and autoDiscover=false"
        echo "Either provide testFiles array or set autoDiscover=true with discoveryPath"
        exit 1
      displayName: 'Warn: No Tests to Run'