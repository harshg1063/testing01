# PR Automated Test Pipeline
# 
# Purpose: Automatically executes tests for pull requests using marker-based agent routing across all modified modules
# 
# This pipeline provides intelligent multi-suite test execution based on:
# - Modified Files: Analyzes all changed test files under tests/hp_app/ module subdirectories
# - Module Discovery: Dynamically discovers affected modules (first directory level under hp_app/)
# - Pytest Markers: Routes tests to compatible agents using @pytest.mark.platform and @pytest.mark.connected_device
# - Parallel Execution: Runs tests for each modified module in parallel across platform×device matrices
#
# Pipeline Behavior:
# 1. Triggers automatically when PRs are opened or updated targeting master branch
# 2. Analyzes all modified test files under tests/hp_app/ to discover affected modules
#    - Root-level test files are ignored (examples only)
#    - Only processes test files within module subdirectories
# 3. For each discovered module, creates a conditional execution stage:
#    - Parses pytest markers from test files using AST
#    - Queries Azure DevOps for agents with matching platform/device capabilities
#    - Generates execution matrix for parallel platform×device testing
# 4. Executes tests in parallel across all modified modules with marker-based routing
# 5. Aggregates results and fails pipeline if any tests fail
#
# Pytest Marker Requirements:
# - All test classes/functions must have @pytest.mark.platform("platform_name") decorator
# - All test classes/functions must have @pytest.mark.connected_device("device_name") decorator
# - Pipeline fails with clear error if markers are missing from modified tests
#
# Error Handling:
# - No test file modifications: Pipeline skips test execution with informational message
# - Missing pytest markers: Pipeline fails with detailed error and example usage
# - Root-level test files: Ignored with warning (not considered test changes)
# - No matching agents: Pipeline fails with platform×device requirements
#
# Template Integration:
# - Uses templates/job templates/marker-based-test-execution-job.yml for test execution
# - Uses templates/stage templates/execute-pr-test-suite.yml for conditional module stages
# - Enables AST-based marker parsing and Azure DevOps API agent discovery

# Disable automatic triggers on branch commits
trigger: none

# Configure PR triggers for main/master branches
pr:
  branches:
    include:
    - master
  paths:
    include:
    - '*'  # Include all paths - file filtering happens in the pipeline logic

# Include variable groups for pipeline configuration
variables:
- group: HP App Build Pipeline Variables  # Contains Project ID, build pipeline references, pool names, and script paths
- group: secrets  # Contains AzureDevOpsPAT for Azure DevOps API agent discovery
- name: moduleList
  value: 'analytics,audio,battery,context_aware,display_control,dock_station,energy_consumption,gesture,hppk,hp_go,MAT,min_acceptance_criteria,pc_device,pen_control,perform_aic,presence_sensing,smart_displays,smart_experience,system_control,task_group,touchpad,video_control,wellbeing'

stages:
- stage: AnalyzePR
  displayName: 'Analyze PR for Test Changes'
  jobs:
  - job: ProcessPR
    displayName: 'Discover Modified Modules'
    pool:
      name: $(discoveryAgentPool)
    steps:
    
    # Step 0: Checkout with full history to ensure git references are available
    - checkout: self
      fetchDepth: 0
    
    # Step 1: Analyze modified files and discover affected modules
    # Filters for Python test files under tests/hp_app/ in module subdirectories
    # Outputs boolean flag for each discovered module (has_<module>=true)
    - task: PowerShell@2
      displayName: 'Discover Modified Modules'
      inputs:
        targetType: 'filePath'
        filePath: '$(Build.SourcesDirectory)/devops/utils/test-execution/Analyze-PRTestFiles.ps1'
        arguments: '-WorkspaceRoot "$(Pipeline.Workspace)/s"'
      name: AnalyzeFiles
      env:
        SYSTEM_PULLREQUEST_SOURCEBRANCH: $(System.PullRequest.SourceBranch)
        SYSTEM_PULLREQUEST_TARGETBRANCH: $(System.PullRequest.TargetBranch)


# Stage 2+: Execute Tests for Modified Modules (parallel execution)
# Dynamically generates stages for all potential modules under tests/hp_app/
# Each stage conditionally runs only if the corresponding module was modified
- ${{ each module in split(variables.moduleList, ',') }}:
  - template: templates/stage templates/execute-pr-test-suite.yml
    parameters:
      moduleName: ${{ module }}

# Stage 3: Aggregate Results from All Test Executions
- stage: SummaryResults
  displayName: 'PR Test Summary'
  dependsOn:
  - AnalyzePR
  - ${{ each module in split(variables.moduleList, ',') }}:
    - ExecuteTests_${{ module }}
  condition: always()
  
  jobs:
  - job: AggregateResults
    displayName: 'Aggregate Test Results'
    pool:
      name: $(discoveryAgentPool)
    variables:
      discoveredModules: $[ stageDependencies.AnalyzePR.ProcessPR.outputs['AnalyzeFiles.discoveredModules'] ]
    steps:
    
    - checkout: self
    
    # Download test results from all execution jobs
    - task: DownloadPipelineArtifact@2
      displayName: 'Download Test Results'
      continueOnError: true
      inputs:
        buildType: 'current'
        targetPath: '$(Pipeline.Workspace)/TestResults'
    
    - task: PowerShell@2
      displayName: 'Aggregate Test Results'
      inputs:
        targetType: 'inline'
        script: |
          $ErrorActionPreference = "Continue"
          
          Write-Host "="*80
          Write-Host "PR TEST EXECUTION SUMMARY"
          Write-Host "="*80
          Write-Host ""
          
          $discoveredModulesStr = "$(discoveredModules)"
          if ([string]::IsNullOrEmpty($discoveredModulesStr)) {
            Write-Host "No modules were discovered for execution"
            exit 0
          }
          
          $modules = $discoveredModulesStr -split ','
          Write-Host "Modules Modified in PR: $($modules.Count)"
          Write-Host ""
          
          # Find all JUnit XML files
          $testResultFiles = Get-ChildItem -Path "$(Pipeline.Workspace)/TestResults" -Filter "*.xml" -Recurse -ErrorAction SilentlyContinue
          
          if (-not $testResultFiles -or $testResultFiles.Count -eq 0) {
            Write-Host "No test result files found. Tests may not have executed."
            Write-Host ""
            Write-Host "Modules scheduled for execution:"
            foreach ($module in $modules) {
              Write-Host "  - $module"
            }
            exit 0
          }
          
          Write-Host "Found $($testResultFiles.Count) test result file(s)"
          Write-Host ""
          
          # Parse JUnit XML files and aggregate results
          $totalTests = 0
          $totalPassed = 0
          $totalFailed = 0
          $totalSkipped = 0
          $testSuites = @{}
          
          foreach ($file in $testResultFiles) {
            Write-Host "Processing: $($file.Name)"
            
            try {
              [xml]$xmlContent = Get-Content $file.FullName
              
              # JUnit XML can have different structures
              $testsuiteNodes = $xmlContent.SelectNodes("//testsuite")
              
              foreach ($testsuite in $testsuiteNodes) {
                $suiteName = $testsuite.name
                if (-not $suiteName) { $suiteName = $file.BaseName }
                
                # Extract platform/device from file name
                # Format: test-results-<platform>-<device>.xml
                if ($file.Name -match 'test-results-([^-]+)-(.+)\.xml') {
                  $platform = $matches[1]
                  $device = $matches[2]
                  $suiteKey = "$suiteName [$platform × $device]"
                } else {
                  $suiteKey = $suiteName
                }
                
                if (-not $testSuites.ContainsKey($suiteKey)) {
                  $testSuites[$suiteKey] = @{
                    Tests = @()
                    Passed = 0
                    Failed = 0
                    Skipped = 0
                  }
                }
                
                # Process test cases
                $testcases = $testsuite.SelectNodes(".//testcase")
                foreach ($testcase in $testcases) {
                  $testName = $testcase.name
                  $className = $testcase.classname
                  
                  # Determine test status
                  $status = "Passed"
                  $message = ""
                  
                  if ($testcase.failure) {
                    $status = "Failed"
                    $message = $testcase.failure.message
                    $testSuites[$suiteKey].Failed++
                    $totalFailed++
                  }
                  elseif ($testcase.error) {
                    $status = "Failed"
                    $message = $testcase.error.message
                    $testSuites[$suiteKey].Failed++
                    $totalFailed++
                  }
                  elseif ($testcase.skipped) {
                    $status = "Skipped"
                    $message = $testcase.skipped.message
                    $testSuites[$suiteKey].Skipped++
                    $totalSkipped++
                  }
                  else {
                    $testSuites[$suiteKey].Passed++
                    $totalPassed++
                  }
                  
                  $totalTests++
                  
                  $testSuites[$suiteKey].Tests += @{
                    Name = $testName
                    ClassName = $className
                    Status = $status
                    Message = $message
                  }
                }
              }
            }
            catch {
              Write-Warning "Failed to parse $($file.Name): $_"
            }
          }
          
          # Display results by test suite
          Write-Host ""
          Write-Host "="*80
          Write-Host "TEST RESULTS BY SUITE"
          Write-Host "="*80
          Write-Host ""
          
          foreach ($suiteKey in ($testSuites.Keys | Sort-Object)) {
            $suite = $testSuites[$suiteKey]
            $suiteTotal = $suite.Passed + $suite.Failed + $suite.Skipped
            
            Write-Host "Suite: $suiteKey"
            Write-Host "  Total: $suiteTotal | Passed: $($suite.Passed) | Failed: $($suite.Failed) | Skipped: $($suite.Skipped)"
            Write-Host ""
            
            # Group tests by status
            $passedTests = $suite.Tests | Where-Object { $_.Status -eq "Passed" }
            $failedTests = $suite.Tests | Where-Object { $_.Status -eq "Failed" }
            $skippedTests = $suite.Tests | Where-Object { $_.Status -eq "Skipped" }
            
            if ($passedTests) {
              Write-Host "  [PASSED] ($($passedTests.Count) tests):"
              foreach ($test in $passedTests) {
                $displayName = if ($test.ClassName) { "$($test.ClassName)::$($test.Name)" } else { $test.Name }
                Write-Host "    [OK] $displayName" -ForegroundColor Green
              }
              Write-Host ""
            }
            
            if ($failedTests) {
              Write-Host "  [FAILED] ($($failedTests.Count) tests):" -ForegroundColor Red
              foreach ($test in $failedTests) {
                $displayName = if ($test.ClassName) { "$($test.ClassName)::$($test.Name)" } else { $test.Name }
                Write-Host "    [FAIL] $displayName" -ForegroundColor Red
                if ($test.Message) {
                  Write-Host "      Error: $($test.Message)" -ForegroundColor Yellow
                }
              }
              Write-Host ""
            }
            
            if ($skippedTests) {
              Write-Host "  [SKIPPED] ($($skippedTests.Count) tests):"
              foreach ($test in $skippedTests) {
                $displayName = if ($test.ClassName) { "$($test.ClassName)::$($test.Name)" } else { $test.Name }
                Write-Host "    [SKIP] $displayName" -ForegroundColor Gray
                if ($test.Message) {
                  Write-Host "      Reason: $($test.Message)" -ForegroundColor Gray
                }
              }
              Write-Host ""
            }
          }
          
          # Display overall summary
          Write-Host "="*80
          Write-Host "OVERALL SUMMARY"
          Write-Host "="*80
          Write-Host "Total Test Suites: $($testSuites.Count)"
          Write-Host "Total Tests: $totalTests"
          Write-Host "  Passed:  $totalPassed" -ForegroundColor Green
          Write-Host "  Failed:  $totalFailed" -ForegroundColor $(if ($totalFailed -gt 0) { "Red" } else { "White" })
          Write-Host "  Skipped: $totalSkipped" -ForegroundColor Gray
          Write-Host "="*80
          
          # Set pipeline result
          if ($totalFailed -gt 0) {
            Write-Host ""
            Write-Host "##vso[task.logissue type=error]$totalFailed test(s) failed"
            Write-Host "##vso[task.complete result=Failed;]Tests failed"
          }
          elseif ($totalTests -eq 0) {
            Write-Host ""
            Write-Host "##vso[task.logissue type=warning]No tests were executed"
          }
          else {
            Write-Host ""
            Write-Host "All tests passed!" -ForegroundColor Green
          }
      continueOnError: true

    # send HTML test report email to the PR run requester (committer)
    - task: PowerShell@2
      displayName: 'Send Test Report Email'
      continueOnError: true
      inputs:
        targetType: 'inline'
        script: |
          $prAuthorEmail = $null
          
          # Try Build.RequestedForEmail (Azure DevOps PRs)
          $requestedFor = '$(Build.RequestedForEmail)'
          if (-not [string]::IsNullOrEmpty($requestedFor) -and $requestedFor -notlike '$(*') {
            $prAuthorEmail = $requestedFor
          }
          
          # Fall back to git commit author (GitHub PRs)
          if ([string]::IsNullOrEmpty($prAuthorEmail)) {
            try {
               Push-Location "$(Build.SourcesDirectory)"
              $authorEmail = git log -1 --format='%ae'
              
              if (-not [string]::IsNullOrEmpty($authorEmail) -and $authorEmail -match '^[^@]+@[^@]+.[^@]+$') {
                $prAuthorEmail = $authorEmail
              }
              Pop-Location
            }
            catch {
              # Silently fail to next strategy
            }
          }
          
          # Skip if no valid email found
          if ([string]::IsNullOrEmpty($prAuthorEmail) -or $prAuthorEmail -notmatch '^[^@]+@[^@]+.[^@]+$') {
            Write-Host "##vso[task.logissue type=warning]Unable to determine PR author email - skipping notification"
            exit 0
          }
          
          Write-Host "Sending test report to: $prAuthorEmail"
          
          python "$(Build.SourcesDirectory)/scripts/send_test_report.py" `
            --test-results-path "$(Pipeline.Workspace)/TestResults" `
            --pipeline-name "$(Build.DefinitionName)" `
            --build-url "$(System.TeamFoundationCollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)" `
            --recipients "$prAuthorEmail"

    - task: PowerShell@2
      displayName: 'Check for Test Failures'
      inputs:
        targetType: 'inline'
        script: |
          # This task will fail the pipeline if any test execution stage failed
          # Azure DevOps automatically tracks stage dependencies and results
          
          Write-Host "Checking for test execution failures..."
          
          $discoveredModulesStr = "$(discoveredModules)"
          if ([string]::IsNullOrEmpty($discoveredModulesStr)) {
            Write-Host "No modules were executed"
            exit 0
          }
          
          # If we reached here and any test stage failed, Azure DevOps will have marked
          # this stage's dependency accordingly. We explicitly fail to propagate test failures.
          
          # Check environment for stage results (this is implicit in Azure DevOps)
          # Since stages run in dependency chain, failures are already tracked
          
          Write-Host "Test execution validation complete"
          
          # Note: Azure DevOps automatically fails the pipeline if dependent stages fail
          # unless we use condition: succeededOrFailed() or condition: always()
          # Since our condition is always(), we need to explicitly check and fail
          
          # The actual failure detection happens through Azure DevOps dependency tracking
          # If any ExecuteTests_* stage failed, this summary stage will reflect that

# Stage 4: Handle Error Cases
- stage: HandleErrors
  displayName: 'Handle Test Execution Errors'
  dependsOn: AnalyzePR
  condition: failed('AnalyzePR')
  jobs:
  - job: ErrorHandling
    displayName: 'Test Execution Failed'
    pool:
      name: $(discoveryAgentPool)
    steps:

    - task: PowerShell@2
      displayName: 'Display Error Information'
      inputs:
        targetType: 'inline'
        script: |
          Write-Host "##vso[task.logissue type=error]========================================="
          Write-Host "##vso[task.logissue type=error]PR TEST EXECUTION FAILED"
          Write-Host "##vso[task.logissue type=error]========================================="
          Write-Host "##vso[task.logissue type=error]The PR analysis or test execution failed. Common reasons:"
          Write-Host "##vso[task.logissue type=error]"
          Write-Host "##vso[task.logissue type=error]1. MISSING PYTEST MARKERS"
          Write-Host "##vso[task.logissue type=error]   All test classes/functions must have required markers:"
          Write-Host "##vso[task.logissue type=error]   @pytest.mark.platform(\"platform_name\")"
          Write-Host "##vso[task.logissue type=error]   @pytest.mark.connected_device(\"device_name\")"
          Write-Host "##vso[task.logissue type=error]"
          Write-Host "##vso[task.logissue type=error]   Example:"
          Write-Host "##vso[task.logissue type=error]   @pytest.mark.platform(\"cashmerexi\", \"machu13x\")"
          Write-Host "##vso[task.logissue type=error]   @pytest.mark.connected_device(\"roo\", \"moonracer\")"
          Write-Host "##vso[task.logissue type=error]   class TestPenControl:"
          Write-Host "##vso[task.logissue type=error]       def test_pen_button(self):"
          Write-Host "##vso[task.logissue type=error]           # test code"
          Write-Host "##vso[task.logissue type=error]"
          Write-Host "##vso[task.logissue type=error]   See existing tests in tests/hp_app/pen_control for examples"
          Write-Host "##vso[task.logissue type=error]"
          Write-Host "##vso[task.logissue type=error]2. Git repository access issues"
          Write-Host "##vso[task.logissue type=error]3. No matching agents for platform×device combinations"
          Write-Host "##vso[task.logissue type=error]4. Azure DevOps API authentication failure (check AzureDevOpsPAT)"
          Write-Host "##vso[task.logissue type=error]"
          Write-Host "##vso[task.logissue type=error]========================================="
          Write-Host "##vso[task.logissue type=error]Please check the stage logs for detailed error information:"
          Write-Host "##vso[task.logissue type=error]- AnalyzePR stage: Module discovery errors"
          Write-Host "##vso[task.logissue type=error]- ExecuteTests_<module> stages: Marker parsing and agent discovery errors"
          Write-Host "##vso[task.logissue type=error]========================================="
          exit 1

# Stage 5: Handle No Test Changes
- stage: NoTestChanges
  displayName: 'No Test Changes Detected'
  dependsOn: AnalyzePR
  condition: and(succeeded('AnalyzePR'), ne(dependencies.AnalyzePR.outputs['ProcessPR.AnalyzeFiles.hasTestChanges'], 'true'))
  jobs:
  - job: NoChangesMessage
    displayName: 'No Test Changes Message'
    pool:
      name: $(discoveryAgentPool)
    steps:

    - task: PowerShell@2
      displayName: 'No Test Changes Information'
      inputs:
        targetType: 'inline'
        script: |
          Write-Host "=========================================="
          Write-Host "PR Analysis Complete - No Test Execution Required"
          Write-Host "=========================================="
          Write-Host "Reason: No test files in module subdirectories were modified in this PR"
          Write-Host ""
          Write-Host "Expected structure:"
          Write-Host "  tests/hp_app/<module>/*.py"
          Write-Host "  Example: tests/hp_app/pen_control/test_pen.py"
          Write-Host ""
          Write-Host "Note: Root-level test files (e.g., test_basic_check.py) are ignored"
          Write-Host "      These are examples only and not executed in PR pipeline"
          Write-Host ""
          Write-Host "File types: *.py (Python test files)"
          Write-Host "Required markers: @pytest.mark.platform() and @pytest.mark.connected_device()"
          Write-Host "=========================================="
          Write-Host "##vso[task.logissue type=warning]No test files in module subdirectories were modified in this PR."