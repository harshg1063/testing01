# Azure DevOps Pipeline: Agent State Switcher
# Purpose: Switches agent state between Jenkins and ADO modes, device-agnostic

trigger: none
pr: none


parameters:
- name: executionMode
  displayName: 'Execution Mode (ADO/Jenkins/Update_TV_Capability/Update_Hostname_Capability/Update_Platform_Capability)'
  type: string
  values:
    - Jenkins
    - ADO
    - Update_TV_Capability
    - Update_Hostname_Capability
    - Update_Platform_Capability
- name: agent
  displayName: 'Target Agent (optional, default: all otherwise agent name)'
  type: string
  default: 'all'

jobs:
- ${{ if eq(parameters.agent, 'all') }}:
  - job: DiscoverAgents
    displayName: 'Discover Online Agents'
    pool:
      name: ASQE-QAMA-VM
    variables:
      - group: secrets  # Contains AzureDevOpsPAT
    steps:
      - powershell: |
            $ErrorActionPreference = 'Stop'
            $pat = $env:AZUREDEVOPSPAT
            if (-not $pat) { throw 'AzureDevOpsPAT not set' }
            $org = 'hpcodeway'
            $poolName = 'ASQE-QAMA-General'
            $apiVersion = '6.0'
            Write-Host "Connecting to Azure DevOps organization: $org"
            Write-Host "Querying pool: $poolName"
            $headers = @{ Authorization = ('Basic ' + [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes(":$pat"))) }
            $poolsUrl = "https://dev.azure.com/$org/_apis/distributedtask/pools?api-version=$apiVersion"
            $pools = (Invoke-RestMethod -Uri $poolsUrl -Headers $headers -Method Get).value
            $pool = $pools | Where-Object { $_.name -eq $poolName }
            if (-not $pool) { throw "Pool $poolName not found" }
            $poolId = $pool.id
            Write-Host "Found pool ID: $poolId"
            $agentsUrl = "https://dev.azure.com/$org/_apis/distributedtask/pools/$poolId/agents?includeCapabilities=true&api-version=$apiVersion"
            $agents = (Invoke-RestMethod -Uri $agentsUrl -Headers $headers -Method Get).value
            Write-Host "Total agents in pool: $($agents.Count)"

            $snapshotDir = Join-Path $env:BUILD_ARTIFACTSTAGINGDIRECTORY 'agent-capability-snapshots'
            if (-not (Test-Path $snapshotDir)) {
              New-Item -Path $snapshotDir -ItemType Directory -Force | Out-Null
            }
            $snapshotFile = Join-Path $snapshotDir "prechange-all-agents-capabilities.json"
            $agents | ConvertTo-Json -Depth 20 | Set-Content -Path $snapshotFile -Encoding UTF8
            Write-Host "Saved pre-change capability snapshot: $snapshotFile"

            $onlineAgents = $agents | Where-Object { $_.status -eq 'online' -and $_.enabled -eq $true } | Select-Object -ExpandProperty name
            Write-Host "Online agents found: $($onlineAgents.Count)"
            
            # Create matrix object (hashtable with agent names as keys)
            $matrix = @{}
            foreach ($agent in $onlineAgents) {
              Write-Host "  - $agent"
              $matrix[$agent] = @{
                agentName = $agent
              }
            }
            
            $matrixJson = $matrix | ConvertTo-Json -Compress
            Write-Host "Agent matrix JSON: $matrixJson"
            Write-Host "##vso[task.setvariable variable=onlineAgents;isOutput=true]$matrixJson"
        env:
          AZUREDEVOPSPAT: $(AzureDevOpsPAT)
        name: SetOnlineAgents
        displayName: 'Get Online Agents'
  - job: SetUpdateActiveHours
    displayName: 'Set Update Active Hours'
    dependsOn: DiscoverAgents
    pool:
      name: ASQE-QAMA-General
      demands:
        - Agent.Name -equals $(agentName)
    variables:
      - group: secrets  # Contains AzureDevOpsPAT
    strategy:
      matrix: $[ dependencies.DiscoverAgents.outputs['SetOnlineAgents.onlineAgents'] ]
    steps:
      - task: PowerShell@2
        displayName: 'Set Update Active Hours (per agent)'
        inputs:
          targetType: 'filePath'
          filePath: '$(Build.SourcesDirectory)\scripts\Set-UpdateActiveHours.ps1'
- ${{ if ne(parameters.agent, 'all') }}:
  - job: SetUpdateActiveHours
    displayName: 'Set Update Active Hours'
    pool:
      name: ASQE-QAMA-General
      demands:
        - Agent.Name -equals ${{ parameters.agent }}
    variables:
      - group: secrets  # Contains AzureDevOpsPAT
    steps:
      - powershell: |
            $ErrorActionPreference = 'Stop'
            $pat = $env:AZUREDEVOPSPAT
            if (-not $pat) { throw 'AzureDevOpsPAT not set' }
            $org = 'hpcodeway'
            $poolName = 'ASQE-QAMA-General'
            $apiVersion = '6.0'
            $headers = @{ Authorization = ('Basic ' + [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes(":$pat"))) }

            $poolsUrl = "https://dev.azure.com/$org/_apis/distributedtask/pools?api-version=$apiVersion"
            $pools = (Invoke-RestMethod -Uri $poolsUrl -Headers $headers -Method Get).value
            $pool = $pools | Where-Object { $_.name -eq $poolName }
            if (-not $pool) { throw "Pool $poolName not found" }
            $poolId = $pool.id

            $agentsUrl = "https://dev.azure.com/$org/_apis/distributedtask/pools/$poolId/agents?includeCapabilities=true&api-version=$apiVersion"
            $agents = (Invoke-RestMethod -Uri $agentsUrl -Headers $headers -Method Get).value

            $snapshotDir = Join-Path $env:BUILD_ARTIFACTSTAGINGDIRECTORY 'agent-capability-snapshots'
            if (-not (Test-Path $snapshotDir)) {
              New-Item -Path $snapshotDir -ItemType Directory -Force | Out-Null
            }
            $snapshotFile = Join-Path $snapshotDir "prechange-single-agent-capabilities.json"
            $agents | ConvertTo-Json -Depth 20 | Set-Content -Path $snapshotFile -Encoding UTF8
            Write-Host "Saved pre-change capability snapshot: $snapshotFile"
        env:
          AZUREDEVOPSPAT: $(AzureDevOpsPAT)
        displayName: 'Capture Pre-Change Agent Capabilities'
      - task: PublishPipelineArtifact@1
        displayName: 'Publish Pre-Change Agent Capability Snapshot'
        inputs:
          targetPath: '$(Build.ArtifactStagingDirectory)/agent-capability-snapshots'
          artifact: 'prechange-agent-capabilities'
          publishLocation: 'pipeline'
      - powershell: |
            $ErrorActionPreference = 'Stop'
            $pat = $env:AZUREDEVOPSPAT
            if (-not $pat) { throw 'AzureDevOpsPAT not set' }
            $org = 'hpcodeway'
            $poolName = 'ASQE-QAMA-General'
            $apiVersion = '6.0'
            $headers = @{ Authorization = ('Basic ' + [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes(":$pat"))) }
            $poolsUrl = "https://dev.azure.com/$org/_apis/distributedtask/pools?api-version=$apiVersion"
            $pools = (Invoke-RestMethod -Uri $poolsUrl -Headers $headers -Method Get).value
            $pool = $pools | Where-Object { $_.name -eq $poolName }
            if (-not $pool) { throw "Pool $poolName not found" }
            $poolId = $pool.id
            $agentsUrl = "https://dev.azure.com/$org/_apis/distributedtask/pools/$poolId/agents?includeCapabilities=true&api-version=$apiVersion"
            $agents = (Invoke-RestMethod -Uri $agentsUrl -Headers $headers -Method Get).value
            $target = "${{ parameters.agent }}"
            $onlineAgent = $agents | Where-Object { $_.name -eq $target -and $_.status -eq 'online' -and $_.enabled -eq $true }
            if (-not $onlineAgent) {
              Write-Error "Agent '$target' is offline. To bring it online, ensure the ADO agent service is running on the device and the device is connected to the network."
            } else {
              Write-Host "Agent '$target' is online. Proceeding."
            }
        env:
          AZUREDEVOPSPAT: $(AzureDevOpsPAT)
        displayName: 'Check Single Agent Online'
      - task: PowerShell@2
        displayName: 'Set Update Active Hours (per agent)'
        inputs:
          targetType: 'filePath'
          filePath: '$(Build.SourcesDirectory)\scripts\Set-UpdateActiveHours.ps1'
