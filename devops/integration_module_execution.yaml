# Multi-module RC Marker-Based Test Execution Pipeline
#
# This pipeline supports selecting multiple modules (checkbox-style boolean parameters)
# and aggregates results for TestRail upload.

trigger: none
pr: none

parameters:
- name: buildVersion
  displayName: 'Build Version (leave empty for latest)'
  type: string
  default: 'latest'
- name: testrailRunId
  displayName: 'TestRail Run ID (leave empty to skip)'
  type: string
  default: 'none'
- name: integration_only
  displayName: '>>> Integration tests only <<<'
  type: boolean
  default: false


- name: run_audio
  displayName: 'Run: audio'
  type: boolean
  default: false
- name: run_smart_displays
  displayName: 'Run: smart_displays'
  type: boolean
  default: false
- name: run_gesture
  displayName: 'Run: gesture'
  type: boolean
  default: false
- name: run_presence_sensing
  displayName: 'Run: presence_sensing'
  type: boolean
  default: false
- name: run_system_control
  displayName: 'Run: system_control'
  type: boolean
  default: false
- name: run_task_group
  displayName: 'Run: task_group'
  type: boolean
  default: false
- name: run_touchpad
  displayName: 'Run: touchpad'
  type: boolean
  default: false
- name: run_wellbeing
  displayName: 'Run: wellbeing'
  type: boolean
  default: false

variables:
- group: secrets
- group: HP App Build Pipeline Variables
- name: testSuiteBasePath
  value: 'tests/hp_app'
- name: pipelineIdStaging
  value: $[variables['Production']]

stages:
- stage: PrepareTestRun
  displayName: 'Prepare Selected Modules Test Run'
  dependsOn: []

  jobs:
  - job: CategorizeTests
    displayName: 'Categorize TestRail Tests by Suite'
    pool:
      name: ASQE-QAMA-VM

    steps:
    - checkout: self

    - ${{ if and(ne(parameters.testrailRunId, ''), ne(parameters.testrailRunId, 'none')) }}:
      - task: PythonScript@0
        name: CategorizeTestRailTests
        displayName: 'Categorize TestRail Tests by Suite'
        env:
          TESTRAIL_URL: $(TESTRAIL_URL)
          TESTRAIL_USER_NAME: $(TESTRAIL_USER_NAME)
          TESTRAIL_API_KEY: $(TESTRAIL_API_KEY)
        inputs:
          scriptSource: 'filePath'
          scriptPath: '$(Build.Repository.LocalPath)/devops/utils/test-execution/categorize-testrail-tests.py'
          arguments: '--run-id "${{ parameters.testrailRunId }}" --base-path "$(Build.Repository.LocalPath)/$(testSuiteBasePath)" --output "$(Build.ArtifactStagingDirectory)/testrail-suite-categorization.json"'
          workingDirectory: '$(Build.Repository.LocalPath)'
          failOnStderr: false

    - ${{ if or(eq(parameters.testrailRunId, ''), eq(parameters.testrailRunId, 'none')) }}:
      - task: PowerShell@2
        name: CategorizeTestRailTests
        displayName: 'Set All Suites to Run (No TestRail Filter)'
        inputs:
          targetType: 'inline'
          script: |
            # When no TestRail run ID provided, all suites should run
            Write-Host "##[section]No TestRail run ID provided - all suites will execute"
            Write-Host "##vso[task.setvariable variable=audioTestCount;isOutput=true]999"
            Write-Host "##vso[task.setvariable variable=smart_displaysTestCount;isOutput=true]999"
            Write-Host "##vso[task.setvariable variable=gestureTestCount;isOutput=true]999"
            Write-Host "##vso[task.setvariable variable=presence_sensingTestCount;isOutput=true]999"
            Write-Host "##vso[task.setvariable variable=system_controlTestCount;isOutput=true]999"
            Write-Host "##vso[task.setvariable variable=task_groupTestCount;isOutput=true]999"
            Write-Host "##vso[task.setvariable variable=touchpadTestCount;isOutput=true]999"
            Write-Host "##vso[task.setvariable variable=wellbeingTestCount;isOutput=true]999"

    - ${{ if and(ne(parameters.testrailRunId, ''), ne(parameters.testrailRunId, 'none')) }}:
      - task: PublishPipelineArtifact@1
        displayName: 'Publish TestRail Categorization'
        inputs:
          targetPath: '$(Build.ArtifactStagingDirectory)/testrail-suite-categorization.json'
          artifact: 'TestRail Categorization'
          publishLocation: 'pipeline'

- stage: RC_Audio
  displayName: 'RC: Audio Tests'
  dependsOn: PrepareTestRun
  condition: and(succeeded(), ${{ parameters.run_audio }}, or(or(eq('${{ parameters.testrailRunId }}', ''), eq('${{ parameters.testrailRunId }}', 'none')), gt(dependencies.PrepareTestRun.outputs['CategorizeTests.CategorizeTestRailTests.audioTestCount'], 0)))
  jobs:
  - template: templates/job templates/integration-test-execution-job.yml
    parameters:
      suitePath: '$(testSuiteBasePath)/audio'
      pipelineId: $(pipelineIdStaging)
      buildVersion: '${{ replace(parameters.buildVersion, ''latest'', '''') }}'
      testrailRunId: '${{ replace(parameters.testrailRunId, ''none'', '''') }}'
      pytestArgs: '-v --tb=short'
      workingDirectory: '$(Build.SourcesDirectory)'
      ${{ if parameters.integration_only }}:
        additionalMarkerFilter: 'integration'
        discoveryMarkerFilter: 'integration'

- stage: RC_SmartDisplays
