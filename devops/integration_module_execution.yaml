  dependsOn: PrepareTestRun
  condition: and(succeeded(), ${{ parameters.run_smart_displays }}, or(or(eq('${{ parameters.testrailRunId }}', ''), eq('${{ parameters.testrailRunId }}', 'none')), gt(dependencies.PrepareTestRun.outputs['CategorizeTests.CategorizeTestRailTests.smart_displaysTestCount'], 0)))
  jobs:
  - template: templates/job templates/integration-test-execution-job.yml
    parameters:
      suitePath: '$(testSuiteBasePath)/smart_displays'
      pipelineId: $(pipelineIdStaging)
      buildVersion: '${{ replace(parameters.buildVersion, ''latest'', '''') }}'
