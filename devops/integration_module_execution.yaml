  condition: and(succeeded(), ${{ parameters.run_presence_sensing }}, or(or(eq('${{ parameters.testrailRunId }}', ''), eq('${{ parameters.testrailRunId }}', 'none')), gt(dependencies.PrepareTestRun.outputs['CategorizeTests.CategorizeTestRailTests.presence_sensingTestCount'], 0)))
