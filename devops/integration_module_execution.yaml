- stage: AggregateResults
  displayName: 'Aggregate and Upload Results'
  dependsOn:
  - RC_Audio
  - RC_SmartDisplays
  - RC_Gesture
  - RC_PresenceSensing
  - RC_SystemControl
  - RC_TaskGroup
  - RC_Touchpad
  - RC_Wellbeing
  condition: >-
    and(
      always(),
      or(${{ parameters.run_audio }}, ${{ parameters.run_smart_displays }}, ${{ parameters.run_gesture }}, ${{ parameters.run_presence_sensing }}, ${{ parameters.run_system_control }}, ${{ parameters.run_task_group }}, ${{ parameters.run_touchpad }}, ${{ parameters.run_wellbeing }}),
      or(
        in(dependencies.RC_Audio.result, 'Succeeded', 'SucceededWithIssues', 'Failed'),
        in(dependencies.RC_SmartDisplays.result, 'Succeeded', 'SucceededWithIssues', 'Failed'),
        in(dependencies.RC_Gesture.result, 'Succeeded', 'SucceededWithIssues', 'Failed'),
        in(dependencies.RC_PresenceSensing.result, 'Succeeded', 'SucceededWithIssues', 'Failed'),
        in(dependencies.RC_SystemControl.result, 'Succeeded', 'SucceededWithIssues', 'Failed'),
        in(dependencies.RC_TaskGroup.result, 'Succeeded', 'SucceededWithIssues', 'Failed'),
        in(dependencies.RC_Touchpad.result, 'Succeeded', 'SucceededWithIssues', 'Failed'),
        in(dependencies.RC_Wellbeing.result, 'Succeeded', 'SucceededWithIssues', 'Failed')
      )
    )

  jobs:
  - job: AggregateAndUpload
    displayName: 'Aggregate Results and Upload to TestRail'
    pool:
      name: ASQE-QAMA-VM

    steps:
    - task: PowerShell@2
      displayName: 'Clean Test Results Directory'
      condition: always()
      inputs:
        targetType: 'inline'
        script: |
          $resultsPath = "$(Pipeline.Workspace)/test-results"
          if (Test-Path $resultsPath) {
            Remove-Item -Recurse -Force "$resultsPath/*"
          }

    - task: DownloadPipelineArtifact@2
      displayName: 'Download All Test Results'
      inputs:
        source: 'current'
        patterns: '**/test-results-*.xml'
        path: '$(Pipeline.Workspace)/test-results'

    - task: PowerShell@2
      displayName: 'Aggregate Results and Upload to TestRail'
      env:
        TESTRAIL_API_KEY: $(TESTRAIL_API_KEY)
        TESTRAIL_USER_NAME: $(TESTRAIL_USER_NAME)
        TESTRAIL_URL: $(TESTRAIL_URL)
        TESTRAIL_PROJECT_ID: $(TESTRAIL_PROJECT_ID)
        TESTRAIL_SUITE_ID: $(TESTRAIL_SUITE_ID)
        SYSTEM_TEAMFOUNDATIONCOLLECTIONURI: $(System.TeamFoundationCollectionUri)
        SYSTEM_TEAMPROJECT: $(System.TeamProject)
        BUILD_BUILDID: $(Build.BuildId)
        PYTHONPATH: $(System.DefaultWorkingDirectory)
        ${{ if and(ne(parameters.testrailRunId, 'none'), ne(parameters.testrailRunId, '')) }}:
          TESTRAIL_RUN_ID: ${{ parameters.testrailRunId }}
        ${{ else }}:
          TESTRAIL_RUN_ID: ''
      inputs:
        targetType: 'inline'
        script: |
          $scriptPath = "$(Build.Repository.LocalPath)/devops/utils/test-execution/aggregate-test-results.py"
          $artifactDir = "$(Pipeline.Workspace)/test-results"

          $args = @(
            "--artifact-dir", "`"$artifactDir`""
          )

          $testrailRunId = $env:TESTRAIL_RUN_ID
          if ($testrailRunId -ne "") {
            $args += "--testrail-run-id", "`"$testrailRunId`""
          } else {
            $args += "--run-name", "`"[Automation][PSCORE][HPX Rebrand][RC][$(Build.BuildNumber)]`""
          }

          $buildVersion = "${{ parameters.buildVersion }}"
          if ($buildVersion -ne "" -and $buildVersion -ne "latest") {
            $args += "--version", "`"$buildVersion`""
          }

          Write-Host "Running: python $scriptPath $($args -join ' ')"
          python $scriptPath @args
        workingDirectory: '$(Build.Repository.LocalPath)'

- stage: AggregationSkippedNotice
  displayName: 'Aggregation Skipped Notice'
  dependsOn:
  - RC_Audio
  - RC_SmartDisplays
  - RC_Gesture
  - RC_PresenceSensing
  - RC_SystemControl
  - RC_TaskGroup
  - RC_Touchpad
  - RC_Wellbeing
  condition: >-
    and(
      always(),
      or(${{ parameters.run_audio }}, ${{ parameters.run_smart_displays }}, ${{ parameters.run_gesture }}, ${{ parameters.run_presence_sensing }}, ${{ parameters.run_system_control }}, ${{ parameters.run_task_group }}, ${{ parameters.run_touchpad }}, ${{ parameters.run_wellbeing }}),
      not(
        or(
          in(dependencies.RC_Audio.result, 'Succeeded', 'SucceededWithIssues', 'Failed'),
          in(dependencies.RC_SmartDisplays.result, 'Succeeded', 'SucceededWithIssues', 'Failed'),
          in(dependencies.RC_Gesture.result, 'Succeeded', 'SucceededWithIssues', 'Failed'),
          in(dependencies.RC_PresenceSensing.result, 'Succeeded', 'SucceededWithIssues', 'Failed'),
          in(dependencies.RC_SystemControl.result, 'Succeeded', 'SucceededWithIssues', 'Failed'),
          in(dependencies.RC_TaskGroup.result, 'Succeeded', 'SucceededWithIssues', 'Failed'),
          in(dependencies.RC_Touchpad.result, 'Succeeded', 'SucceededWithIssues', 'Failed'),
          in(dependencies.RC_Wellbeing.result, 'Succeeded', 'SucceededWithIssues', 'Failed')
        )
      )
    )

  jobs:
  - job: LogSkipReason
    displayName: 'Log Aggregation Skip Reason'
    pool:
      name: ASQE-QAMA-VM
    steps:
    - task: PowerShell@2
      displayName: 'Print Skip Summary'
      inputs:
        targetType: 'inline'
        script: |
          Write-Host "##[warning]No selected module stage produced executable results."
          Write-Host "##[warning]Most likely all selected modules were skipped by TestRail filtering (count=0)."
          Write-Host "##[warning]Aggregation is skipped because there are no result artifacts to aggregate."