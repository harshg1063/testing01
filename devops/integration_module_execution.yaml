  condition: and(succeeded(), ${{ parameters.run_system_control }}, or(or(eq('${{ parameters.testrailRunId }}', ''), eq('${{ parameters.testrailRunId }}', 'none')), gt(dependencies.PrepareTestRun.outputs['CategorizeTests.CategorizeTestRailTests.system_controlTestCount'], 0)))
  jobs:
